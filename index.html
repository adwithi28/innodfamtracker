<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Innovative Design at USC Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Victor+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f7f7f5; --ink:#252323; --muted:#77736f; --line:#d5d2cc; --soft:#eeeeea; --white:#fff;
    --dark:#3c3838; --danger:#c85f5f; --ok:#477b55; --warn:#9a6a28;
    --fam1:#c7ddf2; --fam2:#cce7dc; --fam3:#f2dcc0; --fam4:#f1cdd9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Fragment Mono",monospace;background:var(--bg);color:var(--ink);min-height:100vh;font-size:12px;letter-spacing:-.02em}
  h1,h2,h3,.app-title,.nav button,.section-title,.card-title,label,.btn,.profile-name,.modal-title,.stat-label,.empty-title{font-family:"Victor Mono",monospace}
  button,input,select{font:inherit;color:inherit} button{cursor:pointer}
  .app{max-width:1160px;margin:0 auto;padding:34px 34px 64px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:34px}
  .app-title{font-size:28px;line-height:1;font-weight:500;text-transform:uppercase;letter-spacing:-.06em;white-space:nowrap}
  .nav{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .nav button{border:none;background:transparent;font-size:10px;color:#333;padding:6px 0;border-bottom:1px solid transparent;text-transform:uppercase;letter-spacing:-.04em}
  .nav button.active{border-bottom-color:#333}
  .page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
  .section-title{font-size:15px;font-weight:500;text-transform:uppercase;letter-spacing:-.04em}
  .subtle{color:var(--muted);font-size:10px;line-height:1.55}.muted{color:var(--muted)}
  .semester-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .chip,.sem-chip,.tag{border:1px solid var(--line);background:var(--white);border-radius:999px;padding:6px 12px;font-size:10px;line-height:1;white-space:nowrap}
  .sem-chip.active,.chip.active,.tag.dark{background:var(--dark);color:white;border-color:var(--dark)}
  .grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
  .card,.panel{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:14px}
  .card-title{font-size:12px;text-transform:uppercase;font-weight:500;margin-bottom:12px;letter-spacing:-.04em}
  .btn{border:1px solid var(--line);background:var(--white);border-radius:999px;padding:7px 12px;font-size:10px;line-height:1;white-space:nowrap;text-transform:uppercase;letter-spacing:-.04em}
  .btn.dark{background:var(--dark);color:#fff;border-color:var(--dark)}.btn.danger{color:var(--danger);border-color:#efb4b4}.btn.ghost{background:transparent}.btn.ok{color:var(--ok);border-color:#bcd7c3}
  .btn:hover{filter:brightness(.96)}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.right{margin-left:auto}
  .form-bar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:18px}
  .field{display:flex;flex-direction:column;gap:5px;min-width:140px;flex:1}.field.small{max-width:150px;min-width:105px}.field.tiny{max-width:110px;min-width:90px}
  label{font-size:9px;text-transform:uppercase;color:#555;letter-spacing:-.03em}
  input,select{height:34px;border:1px solid var(--line);background:#fbfbfa;border-radius:999px;padding:0 12px;font-size:11px;outline:none}
  input:focus,select:focus{border-color:#777;background:#fff}.search{width:100%;margin-bottom:12px}.search input{width:100%}
  .alert{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:10px;line-height:1.45}.alert.error{border-color:#efb4b4;color:var(--danger)}.alert.success{border-color:#bcd7c3;color:var(--ok)}.alert.warn{border-color:#ecd5a9;color:var(--warn)}
  .fam-card{min-height:128px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden}.fam-card:before{content:"";position:absolute;inset:0 0 auto 0;height:6px;background:var(--fam-color)}
  .fam-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-top:4px}.fam-name{font-family:"Victor Mono",monospace;font-size:14px;text-transform:uppercase;letter-spacing:-.05em}.fam-points{font-size:20px;letter-spacing:-.06em}.bar-track{height:10px;border:1px solid var(--line);border-radius:999px;background:var(--soft);overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:var(--dark);width:0}
  .member-chips{display:flex;gap:6px;flex-wrap:wrap}.mini-chip{font-size:9px;border:1px solid var(--line);border-radius:999px;padding:4px 7px;background:#fff}.mini-chip.head{border-color:#333;background:#333;color:#fff}
  .list{display:grid;gap:9px}.row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px}.row.clickable:hover{background:#fbfbf9}.row.clickable{cursor:pointer}.row-main{flex:1;min-width:0}.row-title{font-size:12px}.row-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}.points{font-size:13px;letter-spacing:-.05em;white-space:nowrap}.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#eee;font-size:11px;flex:0 0 auto}.avatar.big{width:64px;height:64px;font-size:18px}
  .table{width:100%;border-collapse:collapse;font-size:10px}.table th{text-align:left;font-family:"Victor Mono",monospace;text-transform:uppercase;font-weight:500;color:#666;border-bottom:1px solid var(--line);padding:8px}.table td{border-bottom:1px solid #eee;padding:9px 8px;vertical-align:middle}.table tr:last-child td{border-bottom:none}
  .profile-hero{display:flex;align-items:center;gap:16px;margin-bottom:18px}.profile-name{font-size:32px;line-height:1;font-weight:500;letter-spacing:-.06em;text-transform:uppercase}.profile-meta{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5}.stat{border:1px solid var(--line);border-radius:10px;background:#fbfbfa;padding:12px}.stat-label{font-size:9px;color:#666;text-transform:uppercase;margin-bottom:8px}.stat-value{font-size:13px;line-height:1.4}.divider{height:1px;background:var(--line);margin:18px 0}.subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.danger-zone{border-color:#efb4b4;background:#fffafa}.empty{border:1px dashed var(--line);border-radius:10px;padding:30px;text-align:center;color:var(--muted)}.empty-title{font-size:13px;color:#333;margin-bottom:6px;text-transform:uppercase}.setup{max-width:760px;margin:70px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px}.code{font-family:"Fragment Mono",monospace;background:#f1f1ee;border:1px solid var(--line);border-radius:8px;padding:10px;white-space:pre-wrap;font-size:10px;line-height:1.5;margin-top:10px}
  @media(max-width:850px){.app{padding:24px 16px 44px}.topbar{align-items:flex-start;flex-direction:column}.nav{justify-content:flex-start;gap:14px}.grid.four,.grid.three,.grid.two{grid-template-columns:1fr}.page-head{flex-direction:column}.row{align-items:flex-start}.profile-hero{align-items:flex-start}.form-bar{align-items:stretch}.field,.field.small,.field.tiny{max-width:none;min-width:100%}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useEffect, useMemo, useState } = React;
const h = React.createElement;

/* =========================
   SUPABASE CONFIG
   Replace these with your Supabase Project URL and anon/publishable key.
   Until you replace them, the app uses localStorage preview mode.
========================= */
const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_OR_PUBLISHABLE_KEY";
const USE_SUPABASE = SUPABASE_URL.startsWith("https://") && !SUPABASE_KEY.startsWith("YOUR_");
const db = USE_SUPABASE ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const LOCAL_KEY = "innod_tracker_fall2026_supabase_ready_v1";

const FAM_TEMPLATES = [
  { slot: 1, color: "#c7ddf2", defaultName: "Fam 1" },
  { slot: 2, color: "#cce7dc", defaultName: "Fam 2" },
  { slot: 3, color: "#f2dcc0", defaultName: "Fam 3" },
  { slot: 4, color: "#f1cdd9", defaultName: "Fam 4" }
];
const BLANK = { semesters: [], activeSemesterId: null, fams: [], members: [], memberSemesters: [], tasks: [], completions: [] };

function uid(){ return crypto && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36); }
function today(){ return new Date().toISOString().slice(0,10); }
function initials(name){ return (name||"").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase() || "?"; }
function normalizeBool(v){ return v === true || v === "true" || v === "yes"; }
function sortByName(a,b){ return (a.name||"").localeCompare(b.name||""); }
function escapeHTML(s){ return String(s||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

function createInitialLocalState(){
  const semId = uid();
  const fams = FAM_TEMPLATES.map(t => ({ id: uid(), semester_id: semId, slot: t.slot, name: t.defaultName, color: t.color }));
  return { ...BLANK, semesters: [{ id: semId, name: "Fall 2026", created_at: new Date().toISOString() }], activeSemesterId: semId, fams };
}
function loadLocal(){
  try { const raw = localStorage.getItem(LOCAL_KEY); return raw ? JSON.parse(raw) : createInitialLocalState(); }
  catch { return createInitialLocalState(); }
}
function saveLocal(state){ localStorage.setItem(LOCAL_KEY, JSON.stringify(state)); }

async function fetchAllFromSupabase(){
  const [semesters, fams, members, memberSemesters, tasks, completions] = await Promise.all([
    db.from("semesters").select("*").order("created_at", { ascending: true }),
    db.from("fams").select("*").order("slot", { ascending: true }),
    db.from("members").select("*").order("name", { ascending: true }),
    db.from("member_semesters").select("*"),
    db.from("tasks").select("*").order("name", { ascending: true }),
    db.from("completions").select("*").order("date", { ascending: false })
  ]);
  const responses = [semesters, fams, members, memberSemesters, tasks, completions];
  const bad = responses.find(r => r.error);
  if (bad) throw bad.error;
  let data = {
    semesters: semesters.data || [],
    activeSemesterId: (semesters.data || [])[0]?.id || null,
    fams: fams.data || [], members: members.data || [], memberSemesters: memberSemesters.data || [],
    tasks: tasks.data || [], completions: completions.data || []
  };
  if (data.semesters.length === 0) data = await seedSupabase();
  return data;
}
async function seedSupabase(){
  const { data: sem, error } = await db.from("semesters").insert({ name: "Fall 2026" }).select().single();
  if (error) throw error;
  const famRows = FAM_TEMPLATES.map(t => ({ semester_id: sem.id, slot: t.slot, name: t.defaultName, color: t.color }));
  const famRes = await db.from("fams").insert(famRows).select();
  if (famRes.error) throw famRes.error;
  return { ...BLANK, semesters: [sem], activeSemesterId: sem.id, fams: famRes.data || [] };
}

function App(){
  const [state, setState] = useState(BLANK);
  const [tab, setTab] = useState("leaderboard");
  const [flash, setFlash] = useState(null);
  const [loading, setLoading] = useState(true);
  const [fatal, setFatal] = useState(null);

  async function loadAll(activeId){
    try{
      setLoading(true); setFatal(null);
      const data = USE_SUPABASE ? await fetchAllFromSupabase() : loadLocal();
      const activeSemesterId = activeId || data.activeSemesterId || data.semesters[0]?.id || null;
      setState({ ...data, activeSemesterId });
    } catch(err){ setFatal(err.message || String(err)); }
    finally{ setLoading(false); }
  }
  useEffect(() => { loadAll(); }, []);

  function showFlash(msg, type="success") { setFlash({ msg, type }); setTimeout(() => setFlash(null), 3200); }
  function setLocalState(fn){ setState(prev => { const next = fn(prev); saveLocal(next); return next; }); }

  const activeSemester = state.semesters.find(s => s.id === state.activeSemesterId) || state.semesters[0];
  const activeFams = state.fams.filter(f => f.semester_id === state.activeSemesterId).sort((a,b)=>(a.slot||0)-(b.slot||0));

  function msFor(memberId, semId=state.activeSemesterId){ return state.memberSemesters.find(x => x.member_id === memberId && x.semester_id === semId) || null; }
  function famFor(memberId, semId=state.activeSemesterId){ const ms = msFor(memberId, semId); return state.fams.find(f => f.id === ms?.fam_id) || null; }
  function pointsFor(memberId, semId=state.activeSemesterId){
    return state.completions.filter(c => c.member_id === memberId && c.semester_id === semId).reduce((sum,c) => {
      const t = state.tasks.find(x => x.id === c.task_id); return sum + (t ? Number(t.points) : 0);
    },0);
  }
  function famPoints(famId){
    const ids = state.memberSemesters.filter(ms => ms.semester_id === state.activeSemesterId && ms.fam_id === famId).map(ms => ms.member_id);
    return ids.reduce((sum,id)=>sum + pointsFor(id),0);
  }
  function totalPoints(memberId){ return state.semesters.reduce((sum,s)=>sum + pointsFor(memberId, s.id), 0); }

  const api = { state, setState, setLocalState, loadAll, showFlash, activeSemester, activeFams, msFor, famFor, pointsFor, famPoints, totalPoints };
  const tabs = [["leaderboard","Leaderboard"],["members","Members"],["tasks","Tasks"],["log","Log Points"],["settings","Settings"]];

  if (loading) return h("div", { className:"app" }, h("div", { className:"setup" }, h("div", { className:"section-title" }, "Loading tracker…")));
  if (fatal) return h("div", { className:"app" }, h("div", { className:"setup" }, h("div", { className:"section-title" }, "Database error"), h("p", { className:"subtle" }, fatal), h("div", { className:"code" }, "Check your Supabase URL/key and SQL schema.")));

  return h("div", { className:"app" },
    h("div", { className:"topbar" },
      h("div", { className:"app-title" }, "Innovative Design at USC"),
      h("div", { className:"nav" }, tabs.map(([key,label]) => h("button", { key, className: tab===key ? "active" : "", onClick:()=>setTab(key) }, label)))
    ),
    !USE_SUPABASE && h("div", { className:"alert warn" }, "Preview mode: add your Supabase URL and anon key in the code to make this shared across everyone."),
    flash && h("div", { className:`alert ${flash.type}` }, flash.msg),
    h(SemesterChips, api),
    tab === "leaderboard" && h(Leaderboard, api),
    tab === "members" && h(Members, api),
    tab === "tasks" && h(Tasks, api),
    tab === "log" && h(LogPoints, api),
    tab === "settings" && h(Settings, api)
  );
}
function SemesterChips({ state, setState }){
  return h("div", { className:"semester-row" }, state.semesters.map(s => h("button", { key:s.id, className:`sem-chip ${s.id===state.activeSemesterId?"active":""}`, onClick:()=>setState(p=>({...p, activeSemesterId:s.id})) }, s.name)));
}
function Leaderboard(props){
  const { state, activeSemester, activeFams, famPoints, pointsFor, msFor } = props;
  const ranked = activeFams.map(f => ({ ...f, pts: famPoints(f.id) })).sort((a,b)=>b.pts-a.pts);
  const max = Math.max(1, ...ranked.map(f=>f.pts));
  return h("section", null,
    h("div", { className:"page-head" }, h("div", null, h("div", { className:"section-title" }, `${activeSemester?.name || "Semester"} Standings`), h("p", { className:"subtle" }, "Fam points are calculated from logged member tasks for the active semester."))),
    h("div", { className:"grid four" }, ranked.map((fam,i) => {
      const members = state.members.filter(m => msFor(m.id)?.fam_id === fam.id).sort((a,b)=>pointsFor(b.id)-pointsFor(a.id));
      const heads = members.filter(m => msFor(m.id)?.is_fam_head);
      return h("div", { key:fam.id, className:"card fam-card", style:{"--fam-color":fam.color || "#ddd"} },
        h("div", { className:"fam-head" }, h("div", null, h("div", { className:"fam-name" }, fam.name), h("div", { className:"subtle" }, `${members.length} member${members.length===1?"":"s"}`)), h("div", { className:"fam-points" }, fam.pts)),
        h("div", { className:"bar-track" }, h("div", { className:"bar-fill", style:{width:Math.round(fam.pts/max*100)+"%"} })),
        h("div", { className:"member-chips" }, members.slice(0,8).map(m => h("span", { key:m.id, className:`mini-chip ${msFor(m.id)?.is_fam_head ? "head" : ""}` }, `${initials(m.name)} ${pointsFor(m.id)}`))),
        heads.length > 0 && h("p", { className:"subtle" }, "Fam head" + (heads.length>1?"s: ":": ") + heads.map(hd=>hd.name).join(", "))
      );
    })),
    state.members.length === 0 && h("div", { className:"empty", style:{marginTop:14} }, h("div", { className:"empty-title" }, "Blank slate"), h("p", null, "Add members, tasks, and point logs to start the leaderboard."))
  );
}
function Members(props){
  const { state, setLocalState, loadAll, showFlash, activeFams, msFor, famFor, pointsFor, totalPoints } = props;
  const [q,setQ] = useState(""); const [selected,setSelected] = useState(null);
  const [form,setForm] = useState({ name:"", hex_class:"", is_driver:false, fam_id:"", is_fam_head:false });
  const members = state.members.filter(m => m.name.toLowerCase().includes(q.toLowerCase())).sort(sortByName);
  async function addMember(){
    if(!form.name.trim()) return showFlash("Member name is required", "error");
    try{
      if(USE_SUPABASE){
        const mem = await db.from("members").insert({ name:form.name.trim(), hex_class:form.hex_class.trim(), is_driver:!!form.is_driver }).select().single(); if(mem.error) throw mem.error;
        const ms = await db.from("member_semesters").insert({ member_id:mem.data.id, semester_id:state.activeSemesterId, fam_id:form.fam_id || null, is_fam_head:!!form.is_fam_head }); if(ms.error) throw ms.error;
        await loadAll(state.activeSemesterId);
      } else {
        const id=uid(); setLocalState(s=>({ ...s, members:[...s.members,{id,name:form.name.trim(),hex_class:form.hex_class.trim(),is_driver:!!form.is_driver,created_at:new Date().toISOString()}], memberSemesters:[...s.memberSemesters,{id:uid(),member_id:id,semester_id:s.activeSemesterId,fam_id:form.fam_id||null,is_fam_head:!!form.is_fam_head}] }));
      }
      setForm({ name:"", hex_class:"", is_driver:false, fam_id:"", is_fam_head:false }); showFlash("Member added");
    } catch(e){ showFlash(e.message, "error"); }
  }
  async function removeMember(id){ if(!confirm("Delete this member profile and all of their point logs?")) return; try{ if(USE_SUPABASE){ const r=await db.from("members").delete().eq("id",id); if(r.error) throw r.error; await loadAll(state.activeSemesterId);} else setLocalState(s=>({...s,members:s.members.filter(m=>m.id!==id),memberSemesters:s.memberSemesters.filter(x=>x.member_id!==id),completions:s.completions.filter(c=>c.member_id!==id)})); showFlash("Member deleted"); }catch(e){showFlash(e.message,"error");} }
  if(selected){ const m = state.members.find(x=>x.id===selected); if(m) return h(MemberProfile, { ...props, member:m, onBack:()=>setSelected(null) }); }
  return h("section", null,
    h("div", { className:"page-head" }, h("div", null, h("div", { className:"section-title" }, "Members"), h("p", { className:"subtle" }, "Drivers are saved to profiles. Fam head status resets by semester."))),
    h("div", { className:"form-bar" },
      h(Field,{label:"Full name"}, h("input",{value:form.name,onChange:e=>setForm({...form,name:e.target.value}),placeholder:"Name"})),
      h(Field,{label:"Hex class"}, h("input",{value:form.hex_class,onChange:e=>setForm({...form,hex_class:e.target.value}),placeholder:"Fall 2026"})),
      h(Field,{label:"Fam", small:true}, h("select",{value:form.fam_id,onChange:e=>setForm({...form,fam_id:e.target.value})}, h("option",{value:""},"Unassigned"), activeFams.map(f=>h("option",{key:f.id,value:f.id},f.name)))),
      h(Field,{label:"Driver", tiny:true}, h("select",{value:String(form.is_driver),onChange:e=>setForm({...form,is_driver:normalizeBool(e.target.value)})}, h("option",{value:"false"},"No"), h("option",{value:"true"},"Yes"))),
      h(Field,{label:"Fam head", tiny:true}, h("select",{value:String(form.is_fam_head),onChange:e=>setForm({...form,is_fam_head:normalizeBool(e.target.value)})}, h("option",{value:"false"},"No"), h("option",{value:"true"},"Yes"))),
      h("button",{className:"btn dark",onClick:addMember},"Add")
    ),
    h("div", { className:"search" }, h("input", { value:q, onChange:e=>setQ(e.target.value), placeholder:"Search members" })),
    h("div", { className:"list" }, members.length===0 ? h("div",{className:"empty"},h("div",{className:"empty-title"},"No members yet"),h("p",null,"Add your first member above.")) : members.map(m => {
      const fam=famFor(m.id); const ms=msFor(m.id);
      return h("div", { key:m.id, className:"row clickable", onClick:()=>setSelected(m.id) },
        h("div", { className:"avatar", style:{background:fam?.color || "#eee"} }, initials(m.name)),
        h("div", { className:"row-main" }, h("div", { className:"row-title" }, m.name), h("div", { className:"row-sub" }, `${m.hex_class || "No hex class"} · ${fam?.name || "Unassigned"} · Driver: ${m.is_driver?"Yes":"No"} · Fam head: ${ms?.is_fam_head?"Yes":"No"}`)),
        h("div", { className:"points" }, `${pointsFor(m.id)} pts`),
        h("div", { className:"actions", onClick:e=>e.stopPropagation() }, h("button",{className:"btn",onClick:()=>setSelected(m.id)},"Profile"), h("button",{className:"btn danger",onClick:()=>removeMember(m.id)},"Delete"))
      );
    }))

function Assignments(props){
  const { state, setLocalState, loadAll, showFlash, activeFams, msFor } = props;
  const [draft, setDraft] = useState({});

  useEffect(() => {
    const d = {};
    state.members.forEach(m => {
      const ms = msFor(m.id);
      d[m.id] = {
        fam_id: ms?.fam_id || "",
        is_fam_head: !!ms?.is_fam_head
      };
    });
    setDraft(d);
  }, [state.activeSemesterId, state.members.length, state.memberSemesters.length]);

  async function save(){
    try{
      if(USE_SUPABASE){
        for(const m of state.members){
          const row = draft[m.id] || {};
          const ms = msFor(m.id);
          let r;
          if(ms){
            r = await db.from("member_semesters")
              .update({ fam_id: row.fam_id || null, is_fam_head: !!row.is_fam_head })
              .eq("id", ms.id);
          } else {
            r = await db.from("member_semesters")
              .insert({ member_id: m.id, semester_id: state.activeSemesterId, fam_id: row.fam_id || null, is_fam_head: !!row.is_fam_head });
          }
          if(r.error) throw r.error;
        }
        await loadAll(state.activeSemesterId);
      } else {
        setLocalState(s => ({
          ...s,
          memberSemesters: s.members.reduce((arr, m) => {
            const row = draft[m.id] || {};
            return upsertMS(arr, {
              member_id: m.id,
              semester_id: s.activeSemesterId,
              fam_id: row.fam_id || null,
              is_fam_head: !!row.is_fam_head
            });
          }, s.memberSemesters)
        }));
      }
      showFlash("Assignments saved");
    } catch(e){
      showFlash(e.message, "error");
    }
  }

  return h("div", { className:"card" },
    h("div", { className:"card-title" }, "Current semester assignments"),
    state.members.length === 0
      ? h("p", { className:"subtle" }, "No members yet.")
      : h("div", { className:"list" },
          [...state.members].sort(sortByName).map(m => {
            const row = draft[m.id] || {};
            return h("div", { key:m.id, className:"row" },
              h("div", { className:"avatar" }, initials(m.name)),
              h("div", { className:"row-main" },
                h("div", { className:"row-title" }, m.name),
                h("div", { className:"row-sub" }, m.is_driver ? "Driver" : "Not driver")
              ),
              h("select", {
                value: row.fam_id || "",
                onChange: e => setDraft({ ...draft, [m.id]: { ...row, fam_id: e.target.value } })
              },
                h("option", { value:"" }, "Unassigned"),
                activeFams.map(f => h("option", { key:f.id, value:f.id }, f.name))
              ),
              h("select", {
                value: String(!!row.is_fam_head),
                onChange: e => setDraft({ ...draft, [m.id]: { ...row, is_fam_head: normalizeBool(e.target.value) } })
              },
                h("option", { value:"false" }, "Not head"),
                h("option", { value:"true" }, "Fam head")
              )
            );
          })
        ),
    h("div", { className:"actions", style:{ marginTop:12 } },
      h("button", { className:"btn dark", onClick:save }, "Save assignments")
    )
  );
}
