<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innovative Design Points Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Victor+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --ink: #3f3d3d;
    --muted: #77716f;
    --line: #bdb8b4;
    --soft-line: #dedbd8;
    --paper: #f7f7f5;
    --white: #ffffff;
    --dark: #3d3b3b;
    --danger: #e36969;
    --shadow: 0 10px 30px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: "Fragment Mono", monospace;
    font-size: 12px;
  }

  button, input, select {
    font: inherit;
  }

  button { cursor: pointer; }

  .shell {
    width: min(100%, 1160px);
    margin: 0 auto;
    padding: 34px 28px 70px;
  }

  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 34px;
  }

  .brand {
    font-family: "Victor Mono", monospace;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: 500;
    letter-spacing: -0.07em;
    text-transform: uppercase;
    line-height: 1;
  }

  .subtitle {
    margin-top: 9px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: -0.04em;
  }

  .nav {
    display: flex;
    gap: 22px;
    align-items: center;
    padding-top: 7px;
    white-space: nowrap;
  }

  .nav-btn {
    border: 0;
    background: transparent;
    color: var(--ink);
    font-size: 10px;
    letter-spacing: -0.04em;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
  }

  .nav-btn:hover,
  .nav-btn.active {
    border-bottom-color: var(--ink);
  }

  .flash {
    margin-bottom: 18px;
    padding: 10px 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    color: var(--ink);
    box-shadow: var(--shadow);
  }

  .flash-error { border-color: #efadad; color: #b64242; }
  .flash-warn { border-color: #dcc178; color: #8a6514; }

  .page-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }

  .section-title {
    font-family: "Victor Mono", monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.08em;
    text-transform: uppercase;
  }

  .helper-text {
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 16px;
  }

  .pill-row,
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .toolbar {
    margin-bottom: 26px;
  }

  .pill,
  .btn,
  .input,
  .select {
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--ink);
    border-radius: 999px;
    height: 30px;
    padding: 0 16px;
    font-size: 10px;
    letter-spacing: -0.04em;
    outline: none;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 74px;
  }

  .pill.active,
  .btn-dark {
    background: var(--dark);
    color: #fff;
    border-color: var(--dark);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover { background: #eeeeeb; }
  .btn-dark:hover { background: #302f2f; }
  .btn-danger { border-color: #efb3b3; color: var(--danger); }
  .btn-danger:hover { background: #fff0f0; }
  .btn-sm { height: 26px; padding: 0 12px; font-size: 9px; }

  .input,
  .select {
    height: 30px;
    min-width: 120px;
  }

  .search { margin-left: auto; min-width: 210px; }

  .card,
  .panel,
  .inline-form {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
  }

  .card { padding: 16px; }

  .inline-form {
    display: grid;
    grid-template-columns: auto 1fr 150px 120px 110px auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    margin-bottom: 24px;
    background: #fff;
  }

  .inline-form.compact {
    grid-template-columns: auto minmax(180px, 1fr) 120px auto;
  }

  .form-label {
    font-family: "Victor Mono", monospace;
    font-size: 15px;
    letter-spacing: -0.08em;
    text-transform: uppercase;
    padding-left: 8px;
  }

  .check-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
    color: var(--ink);
    font-size: 9px;
    text-transform: uppercase;
  }

  .check-wrap label {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  input[type="checkbox"] { accent-color: var(--dark); }

  .empty {
    color: #aaa3a0;
    text-align: center;
    padding: 36px 10px;
    border: 1px dashed var(--soft-line);
    border-radius: 14px;
    background: rgba(255,255,255,0.55);
  }

  .error-text { color: var(--danger); margin: -12px 0 18px 8px; }

  /* Home / leaderboard */
  .fam-stack { display: grid; gap: 22px; }
  .fam-card {
    border-radius: 0;
    border: 0;
    padding: 16px 18px 14px;
    position: relative;
  }

  .fam-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
  }

  .fam-title,
  .points-big {
    font-family: "Victor Mono", monospace;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: -0.08em;
    text-transform: uppercase;
  }

  .bar-wrap {
    height: 10px;
    border-radius: 99px;
    background: rgba(255,255,255,0.75);
    overflow: hidden;
    margin-bottom: 13px;
  }

  .bar { height: 100%; border-radius: 99px; transition: width .35s ease; }

  .mini-members {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; min-width: 0; }
  .mini-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 8px; color: var(--muted); }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    color: #fff;
    flex: 0 0 auto;
    font-family: "Victor Mono", monospace;
    font-size: 11px;
    letter-spacing: -0.06em;
  }

  .avatar-sm { width: 20px; height: 20px; font-size: 7px; }
  .avatar-lg { width: 62px; height: 62px; font-size: 18px; }

  /* Rows */
  .rows { display: grid; gap: 14px; }

  .member-row,
  .task-row,
  .semester-row,
  .settings-row,
  .log-row {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    min-height: 58px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
  }

  .member-row.clickable { cursor: pointer; }
  .member-row.clickable:hover { background: #fbfbfa; }

  .main-info { flex: 1; min-width: 0; }
  .member-name,
  .row-title {
    font-family: "Victor Mono", monospace;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.08em;
    text-transform: uppercase;
  }

  .member-sub,
  .row-sub { color: var(--muted); margin-top: 5px; font-size: 9px; }

  .tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 16px;
    padding: 0 8px;
    border: 1px solid var(--line);
    border-radius: 99px;
    font-size: 7px;
    color: var(--ink);
    background: #fff;
    margin-right: 5px;
    text-transform: uppercase;
  }

  .row-points {
    font-family: "Victor Mono", monospace;
    font-size: 15px;
    letter-spacing: -0.08em;
    white-space: nowrap;
  }

  .row-actions { display: flex; align-items: center; gap: 8px; }

  .icon-x,
  .fab {
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .icon-x {
    width: 28px;
    height: 28px;
    border: 1px solid #efb3b3;
    background: #fff;
    color: var(--danger);
  }

  .fab {
    position: fixed;
    right: max(28px, calc((100vw - 1160px)/2 + 28px));
    bottom: 34px;
    width: 58px;
    height: 58px;
    border: 0;
    background: var(--dark);
    color: #fff;
    font-size: 30px;
    box-shadow: 0 14px 28px rgba(0,0,0,.18);
  }

  /* Profile */
  .profile-card { padding: 24px; }
  .profile-top { display: flex; align-items: center; gap: 18px; margin-bottom: 24px; }
  .profile-name {
    font-family: "Victor Mono", monospace;
    font-size: 34px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.09em;
    text-transform: uppercase;
  }
  .profile-meta { color: var(--muted); margin-top: 8px; }
  .profile-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin: 20px 0; }
  .profile-stat { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fbfbfa; }
  .profile-label { font-size: 8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .profile-value { font-family: "Victor Mono", monospace; font-size: 14px; letter-spacing: -0.07em; text-transform: uppercase; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 8px; text-transform: uppercase; font-weight: 400; padding: 9px 8px; border-bottom: 1px solid var(--soft-line); }
  td { padding: 10px 8px; border-bottom: 1px solid #efedeb; font-size: 10px; }
  tr:last-child td { border-bottom: 0; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .danger-zone { margin-top: 24px; border-color: #efb3b3; background: #fff8f8; }

  @media (max-width: 850px) {
    .topbar, .page-head { flex-direction: column; align-items: stretch; }
    .nav { overflow-x: auto; gap: 16px; padding-bottom: 4px; }
    .inline-form, .inline-form.compact { grid-template-columns: 1fr; border-radius: 18px; }
    .form-label { padding-left: 0; }
    .search { margin-left: 0; min-width: 100%; }
    .member-row, .task-row, .semester-row, .settings-row, .log-row { align-items: flex-start; flex-wrap: wrap; }
    .row-actions { width: 100%; justify-content: flex-end; }
    .profile-grid, .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;
const h = React.createElement;

const FAM_META = [
  { key: "fam1", bg: "#dce8ff", text: "#4f6fae", bar: "#8fa8ed", defaultName: "Maple Fam" },
  { key: "fam2", bg: "#fbf1de", text: "#8f7450", bar: "#b39a71", defaultName: "Willow Fam" },
  { key: "fam3", bg: "#e3f9df", text: "#5f8e5d", bar: "#79ae74", defaultName: "Cypress Fam" },
  { key: "fam4", bg: "#ffe4e3", text: "#9e6667", bar: "#c78789", defaultName: "Aspen Fam" }
];

const STORAGE_KEY = "innovative_design_tracker_layout_v1";

function uid() { return Math.random().toString(36).slice(2, 9); }
function today() { return new Date().toISOString().slice(0, 10); }
function initials(name) { return (name || "?").split(" ").map(w => w[0] || "").join("").slice(0, 2).toUpperCase(); }
function getFamMeta(key) { return FAM_META.find(f => f.key === key) || FAM_META[0]; }
function loadState() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

const DEFAULT_STATE = {
  semesters: [{ id: "s1", name: "Spring 2026" }],
  activeSem: "s1",
  famNames: { s1: { fam1: "Maple Fam", fam2: "Willow Fam", fam3: "Cypress Fam", fam4: "Aspen Fam" } },
  tasks: [],
  members: [],
  completions: []
};

function App() {
  const [state, setState] = useState(() => loadState() || DEFAULT_STATE);
  const [tab, setTab] = useState("home");
  const [flash, setFlash] = useState(null);

  function update(fn) {
    setState(prev => {
      const next = fn(prev);
      saveState(next);
      return next;
    });
  }

  function showFlash(msg, type = "success") {
    setFlash({ msg, type });
    setTimeout(() => setFlash(null), 2500);
  }

  const activeSem = state.semesters.find(s => s.id === state.activeSem) || state.semesters[0];
  const famNames = state.famNames[state.activeSem] || {};

  function getFamName(famKey, semId = state.activeSem) {
    const names = state.famNames[semId] || {};
    return names[famKey] || getFamMeta(famKey).defaultName;
  }

  function getMemberFam(member, semId = state.activeSem) {
    return (member.famBySem || {})[semId] || null;
  }

  function memberPts(memberId, semId = state.activeSem) {
    return state.completions
      .filter(c => c.memberId === memberId && c.semId === semId)
      .reduce((sum, c) => {
        const task = state.tasks.find(t => t.id === c.taskId);
        return sum + (task ? Number(task.points) : 0);
      }, 0);
  }

  function famPts(famKey) {
    return state.members
      .filter(m => getMemberFam(m) === famKey)
      .reduce((sum, m) => sum + memberPts(m.id), 0);
  }

  const famsRanked = [...FAM_META]
    .map(f => ({ ...f, displayName: getFamName(f.key), pts: famPts(f.key) }))
    .sort((a, b) => b.pts - a.pts);
  const maxPts = Math.max(1, ...famsRanked.map(f => f.pts));

  const shared = { state, update, showFlash, activeSem, famNames, getFamName, getMemberFam, memberPts, famPts, famsRanked, maxPts };
  const tabs = [["home", "Home"], ["members", "Members"], ["tasks", "Tasks"], ["log", "Log Points"], ["settings", "Settings"]];

  return h("div", { className: "shell" },
    h("header", { className: "topbar" },
      h("div", null,
        h("div", { className: "brand" }, "Innovative Design at USC"),
        h("div", { className: "subtitle" }, activeSem.name + " · " + state.members.length + " members")
      ),
      h("nav", { className: "nav" }, tabs.map(([id, label]) =>
        h("button", { key: id, className: "nav-btn" + (tab === id ? " active" : ""), onClick: () => setTab(id) }, label)
      ))
    ),
    flash && h("div", { className: "flash flash-" + flash.type }, flash.msg),
    tab === "home" && h(Home, shared),
    tab === "members" && h(Members, shared),
    tab === "tasks" && h(Tasks, shared),
    tab === "log" && h(LogPoints, shared),
    tab === "settings" && h(Settings, shared)
  );
}

function SemPills({ state, update }) {
  return h("div", { className: "pill-row" }, state.semesters.map(s =>
    h("button", { key: s.id, className: "pill" + (s.id === state.activeSem ? " active" : ""), onClick: () => update(p => ({ ...p, activeSem: s.id })) }, s.name)
  ));
}

function Home({ state, update, activeSem, famsRanked, maxPts, getMemberFam, memberPts }) {
  return h("main", null,
    h("div", { className: "page-head" },
      h("div", { className: "section-title" }, "Home"),
      h(SemPills, { state, update })
    ),
    state.members.length === 0 && h("div", { className: "empty", style: { marginBottom: 22 } }, "No members yet — add members, assign fams, and log points to build the leaderboard."),
    h("div", { className: "fam-stack" }, famsRanked.map((fam, i) => {
      const fc = getFamMeta(fam.key);
      const members = state.members.filter(m => getMemberFam(m) === fam.key).sort((a, b) => memberPts(b.id) - memberPts(a.id));
      return h("section", { key: fam.key, className: "fam-card", style: { background: fc.bg, color: fc.text } },
        h("div", { className: "fam-head" },
          h("div", { className: "fam-title" }, fam.displayName),
          h("div", { className: "points-big" }, fam.pts + " Points")
        ),
        h("div", { className: "bar-wrap" }, h("div", { className: "bar", style: { width: Math.round(fam.pts / maxPts * 100) + "%", background: fc.bar } })),
        h("div", { className: "mini-members" },
          h("div", { className: "chips" }, members.slice(0, 4).map(m =>
            h("span", { key: m.id, className: "mini-chip" },
              h("span", { className: "avatar avatar-sm", style: { background: fc.bar, color: "#fff" } }, initials(m.name)),
              m.name + " · " + memberPts(m.id) + " pts"
            )
          )),
          h("span", { className: "mini-chip" }, members.length + " Members")
        )
      );
    }))
  );
}

function MemberProfile({ member, state, update, showFlash, getFamName, getMemberFam, memberPts, onBack }) {
  const famKey = getMemberFam(member);
  const famMeta = famKey ? getFamMeta(famKey) : null;
  const history = state.completions.filter(c => c.memberId === member.id).sort((a, b) => b.date.localeCompare(a.date));

  return h("main", null,
    h("div", { className: "page-head" },
      h("button", { className: "btn", onClick: onBack }, "← Back"),
      h("div", { className: "section-title" }, "Member Profile")
    ),
    h("section", { className: "card profile-card" },
      h("div", { className: "profile-top" },
        h("div", { className: "avatar avatar-lg", style: { background: famMeta ? famMeta.bar : "#3d3b3b", color: "#fff" } }, initials(member.name)),
        h("div", null,
          h("div", { className: "profile-name" }, member.name),
          h("div", { className: "profile-meta" }, (member.hexClass || "No hex class") + " · " + (member.driver ? "Driver" : "Not a driver") + (member.famHead ? " · Fam Head" : ""))
        )
      ),
      h("div", { className: "profile-grid" },
        h("div", { className: "profile-stat" }, h("div", { className: "profile-label" }, "Name"), h("div", { className: "profile-value" }, member.name)),
        h("div", { className: "profile-stat" }, h("div", { className: "profile-label" }, "Hex Class"), h("div", { className: "profile-value" }, member.hexClass || "—")),
        h("div", { className: "profile-stat" }, h("div", { className: "profile-label" }, "Current Fam"), h("div", { className: "profile-value" }, famKey ? getFamName(famKey) : "Unassigned")),
        h("div", { className: "profile-stat" }, h("div", { className: "profile-label" }, "Driver"), h("div", { className: "profile-value" }, member.driver ? "Yes" : "No"))
      ),
      h("div", { className: "two-col" },
        h("div", null,
          h("div", { className: "section-title", style: { fontSize: 15, marginBottom: 8 } }, "Points by Semester"),
          h("table", null,
            h("thead", null, h("tr", null, h("th", null, "Semester"), h("th", null, "Fam"), h("th", null, "Points"))),
            h("tbody", null, state.semesters.map(sem => {
              const fk = getMemberFam(member, sem.id);
              return h("tr", { key: sem.id }, h("td", null, sem.name), h("td", null, fk ? getFamName(fk, sem.id) : "Unassigned"), h("td", null, memberPts(member.id, sem.id)));
            }))
          )
        ),
        h("div", null,
          h("div", { className: "section-title", style: { fontSize: 15, marginBottom: 8 } }, "Full History"),
          history.length === 0 ? h("div", { className: "empty" }, "No points logged yet") : h("table", null,
            h("thead", null, h("tr", null, h("th", null, "Date"), h("th", null, "Task"), h("th", null, "Pts"))),
            h("tbody", null, history.map(c => {
              const task = state.tasks.find(t => t.id === c.taskId);
              return h("tr", { key: c.id }, h("td", null, c.date), h("td", null, task ? task.name : "Deleted task"), h("td", null, task ? "+" + task.points : "—"));
            }))
          )
        )
      )
    )
  );
}

function Members({ state, update, showFlash, activeSem, getFamName, getMemberFam, memberPts }) {
  const [name, setName] = useState("");
  const [hexClass, setHexClass] = useState("");
  const [fam, setFam] = useState("fam1");
  const [driver, setDriver] = useState(false);
  const [famHead, setFamHead] = useState(false);
  const [selected, setSelected] = useState(null);
  const [sortBy, setSortBy] = useState("points");
  const [famFilter, setFamFilter] = useState("all");
  const [hexFilter, setHexFilter] = useState("all");
  const [driverFilter, setDriverFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [err, setErr] = useState("");

  const selectedMember = state.members.find(m => m.id === selected);
  if (selectedMember) return h(MemberProfile, { member: selectedMember, state, update, showFlash, getFamName, getMemberFam, memberPts, onBack: () => setSelected(null) });

  function addMember() {
    if (!name.trim()) { setErr("Full name is required"); return; }
    const id = uid();
    update(s => ({ ...s, members: [...s.members, { id, name: name.trim(), hexClass: hexClass.trim(), driver, famHead, famBySem: { [s.activeSem]: fam } }] }));
    showFlash(name.trim() + " added");
    setName(""); setHexClass(""); setDriver(false); setFamHead(false); setErr("");
  }

  function removeMember(id) {
    const m = state.members.find(x => x.id === id);

function Tasks({ state, update, showFlash }) {
  const [name, setName] = useState("");
  const [pts, setPts] = useState("");
  const [editing, setEditing] = useState(null);
  const [editName, setEditName] = useState("");
  const [editPts, setEditPts] = useState("");
  const [err, setErr] = useState("");

  function addTask() {
    if (!name.trim() || !pts || Number(pts) <= 0) { setErr("Add a task name and positive point value"); return; }
    update(s => ({ ...s, tasks: [...s.tasks, { id: uid(), name: name.trim(), points: Number(pts) }] }));
    setName(""); setPts(""); setErr(""); showFlash("Task added");
  }
  function startEdit(t) { setEditing(t.id); setEditName(t.name); setEditPts(String(t.points)); }
  function saveEdit(id) {
    if (!editName.trim() || !editPts || Number(editPts) <= 0) return;
    update(s => ({ ...s, tasks: s.tasks.map(t => t.id === id ? { ...t, name: editName.trim(), points: Number(editPts) } : t) }));
    setEditing(null); showFlash("Task updated");
  }
  function removeTask(id) {
    if (!window.confirm("Delete this task? Logged completions for this task will also be removed.")) return;
    update(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== id), completions: s.completions.filter(c => c.taskId !== id) }));
    showFlash("Task deleted");
  }

  return h("main", null,
    h("div", { className: "page-head" }, h("div", { className: "section-title" }, "Tasks")),
    h("div", { className: "inline-form compact" },
      h("div", { className: "form-label" }, "Add Task"),
      h("input", { className: "input", placeholder: "Task Name", value: name, onChange: e => setName(e.target.value), onKeyDown: e => e.key === "Enter" && addTask() }),
      h("input", { className: "input", type: "number", min: "1", placeholder: "Point Value", value: pts, onChange: e => setPts(e.target.value), onKeyDown: e => e.key === "Enter" && addTask() }),
      h("button", { className: "btn btn-dark btn-sm", onClick: addTask }, "Add")
    ),
    err && h("div", { className: "error-text" }, err),
    h("div", { className: "rows" },
      state.tasks.length === 0 && h("div", { className: "empty" }, "No tasks yet — add tasks like Coffee Chat, Workshop, or Social."),
      state.tasks.map(t => h("div", { key: t.id, className: "task-row" },
        editing === t.id ? [
          h("input", { key: "n", className: "input", value: editName, onChange: e => setEditName(e.target.value) }),
          h("input", { key: "p", className: "input", type: "number", value: editPts, onChange: e => setEditPts(e.target.value) }),
          h("div", { key: "a", className: "row-actions" }, h("button", { className: "btn btn-sm btn-dark", onClick: () => saveEdit(t.id) }, "Save"), h("button", { className: "btn btn-sm", onClick: () => setEditing(null) }, "Cancel"))
        ] : [
          h("div", { key: "info", className: "main-info" }, h("div", { className: "row-title" }, t.name)),
          h("div", { key: "pts", className: "row-points" }, t.points + " Points"),
          h("div", { key: "actions", className: "row-actions" }, h("button", { className: "btn btn-sm btn-dark", onClick: () => startEdit(t) }, "Edit"), h("button", { className: "icon-x", onClick: () => removeTask(t.id) }, "×"))
        ]
      ))
    )
  );
}

function LogPoints({ state, update, showFlash, activeSem, getFamName, getMemberFam }) {
  const [memberId, setMemberId] = useState("");

  function logPoints() {
    if (!memberId || !taskId || !date) { setErr("Choose a member, task, and date"); return; }
    const task = state.tasks.find(t => t.id === taskId);
    const member = state.members.find(m => m.id === memberId);

  return h("main", null,
    h("div", { className: "page-head" }, h("div", { className: "section-title" }, "Log Points"), h(SemPills, { state, update })),
    h("div", { className: "inline-form" },
      h("div", { className: "form-label" }, "+"),
      h("select", { className: "select", value: memberId, onChange: e => setMemberId(e.target.value) }, h("option", { value: "" }, "Member"), members.map(m => h("option", { key: m.id, value: m.id }, m.name + " — " + getFamName(getMemberFam(m))))),
      h("select", { className: "select", value: taskId, onChange: e => setTaskId(e.target.value) }, h("option", { value: "" }, "Task"), state.tasks.map(t => h("option", { key: t.id, value: t.id }, t.name + " +" + t.points))),

function Settings({ state, update, showFlash, getFamName, getMemberFam }) {
  const [subTab, setSubTab] = useState("fams");
  const [newSemName, setNewSemName] = useState("");
  const [renameMap, setRenameMap] = useState({});
  const [localNames, setLocalNames] = useState(null);
  const [reassignMap, setReassignMap] = useState({});
  const semId = state.activeSem;

  useEffect(() => {
    const currentNames = state.famNames[semId] || {};
    setLocalNames(FAM_META.reduce((acc, f) => ({ ...acc, [f.key]: currentNames[f.key] || f.defaultName }), {}));
  }, [semId]);

  useEffect(() => {
    const map = {};
    state.members.forEach(m => { map[m.id] = getMemberFam(m) || ""; });
    setReassignMap(map);
  }, [semId, state.members.length]);

  useEffect(() => {
    const map = {};
    state.semesters.forEach(s => { map[s.id] = s.name; });
    setRenameMap(map);
  }, [state.semesters.length]);

  function saveFamNames() {
    const cleaned = Object.fromEntries(Object.entries(localNames || {}).map(([k, v]) => [k, v.trim() || getFamMeta(k).defaultName]));
    update(s => ({ ...s, famNames: { ...s.famNames, [semId]: { ...(s.famNames[semId] || {}), ...cleaned } } }));
    showFlash("Fam names saved");
  }

  function addSemester() {
    if (!newSemName.trim()) return;
    const id = uid();
    update(s => ({
      ...s,
      semesters: [...s.semesters, { id, name: newSemName.trim() }],
      activeSem: id,
      famNames: { ...s.famNames, [id]: { ...(s.famNames[s.activeSem] || {}) } },
      members: s.members.map(m => ({ ...m, famBySem: { ...(m.famBySem || {}), [id]: (m.famBySem || {})[s.activeSem] || null } }))
    }));
    setNewSemName(""); setSubTab("reassign"); showFlash("Semester created");
  }

  function saveReassignments() {
    update(s => ({ ...s, members: s.members.map(m => ({ ...m, famBySem: { ...(m.famBySem || {}), [semId]: reassignMap[m.id] || null } })) }));
    showFlash("Assignments saved");
  }

  function renameSemester(id) {
    const name = (renameMap[id] || "").trim();
    if (!name) return showFlash("Semester name cannot be blank", "error");
    update(s => ({ ...s, semesters: s.semesters.map(sem => sem.id === id ? { ...sem, name } : sem) }));
    showFlash("Semester renamed");
  }

  function resetSemester(id) {
    const sem = state.semesters.find(s => s.id === id);
    if (!window.confirm("Reset " + (sem ? sem.name : "this semester") + "? This clears points and fam assignments for this semester only. Member profiles stay saved.")) return;
    update(s => ({
      ...s,
      completions: s.completions.filter(c => c.semId !== id),
      members: s.members.map(m => { const next = { ...(m.famBySem || {}) }; delete next[id]; return { ...m, famBySem: next }; })
    }));
    showFlash("Semester reset");
  }

  function deleteSemester(id) {
    if (state.semesters.length <= 1) return showFlash("Can't delete the only semester", "error");
    const sem = state.semesters.find(s => s.id === id);
    if (!window.confirm("Delete " + (sem ? sem.name : "this semester") + "? Member profiles stay saved.")) return;
    const remaining = state.semesters.filter(s => s.id !== id);
    update(s => {
      const nextFamNames = { ...s.famNames }; delete nextFamNames[id];
      return { ...s, semesters: remaining, activeSem: s.activeSem === id ? remaining[remaining.length - 1].id : s.activeSem, famNames: nextFamNames, members: s.members.map(m => { const next = { ...(m.famBySem || {}) }; delete next[id]; return { ...m, famBySem: next }; }), completions: s.completions.filter(c => c.semId !== id) };
    });
    showFlash("Semester deleted");
  }

  function resetEverything() {
    if (!window.confirm("Reset the entire tracker? This deletes all members, tasks, semesters, and points.")) return;
    localStorage.removeItem(STORAGE_KEY);
    update(() => DEFAULT_STATE);
    showFlash("Tracker reset");
  }

  return h("main", null,
    h("div", { className: "page-head" }, h("div", { className: "section-title" }, "Settings"), h(SemPills, { state, update })),
    h("div", { className: "toolbar" }, [["fams", "Fam Names"], ["reassign", "Reassign Fams"], ["semesters", "Semesters"]].map(([id, label]) => h("button", { key: id, className: "pill" + (subTab === id ? " active" : ""), onClick: () => setSubTab(id) }, label))),

    subTab === "fams" && h("section", null,
      h("p", { className: "helper-text" }, "Fam names are semester-specific. Switch semesters at the top to edit another term."),
      h("div", { className: "rows" },
        FAM_META.map(f =>
          h("div", { key: f.key, className: "settings-row" },
            h("span", { className: "avatar avatar-sm", style: { background: f.bar } }, ""),
            h("div", { className: "main-info" },
              h("div", { className: "row-title" }, "Slot " + (FAM_META.indexOf(f) + 1))
            ),
            h("input", {
              className: "input",
              value: (localNames || {})[f.key] || "",
              onChange: e => setLocalNames(p => ({ ...p, [f.key]: e.target.value }))
            })
          )
        )
      ),
      h("button", { className: "btn btn-dark", style: { marginTop: 16 }, onClick: saveFamNames }, "Save Fam Names")
    ),

    subTab === "reassign" && h("section", null,
      h("p", { className: "helper-text" }, "Set each member's fam for this semester. Their profile remains saved across future semesters."),
      h("div", { className: "rows" }, state.members.length === 0 ? h("div", { className: "empty" }, "No members yet") : [...state.members].sort((a,b) => a.name.localeCompare(b.name)).map(m => {
        const fk = reassignMap[m.id] || "";
        return h("div", { key: m.id, className: "settings-row" }, h("div", { className: "avatar", style: { background: fk ? getFamMeta(fk).bar : "#3d3b3b" } }, initials(m.name)), h("div", { className: "main-info" }, h("div", { className: "row-title" }, m.name), h("div", { className: "row-sub" }, m.hexClass || "No hex class")), h("select", { className: "select", value: fk, onChange: e => setReassignMap(p => ({ ...p, [m.id]: e.target.value })) }, h("option", { value: "" }, "Unassigned"), FAM_META.map(f => h("option", { key: f.key, value: f.key }, getFamName(f.key)))));
      })),
      state.members.length > 0 && h("button", { className: "btn btn-dark", style: { marginTop: 16 }, onClick: saveReassignments }, "Save Assignments")
    ),

    subTab === "semesters" && h("section", null,
      h("p", { className: "helper-text" }, "Semesters store separate fam assignments and point logs. Member profiles are kept across semesters."),
      h("div", { className: "inline-form compact" }, h("div", { className: "form-label" }, "New Semester"), h("input", { className: "input", placeholder: "e.g. Fall 2026", value: newSemName, onChange: e => setNewSemName(e.target.value), onKeyDown: e => e.key === "Enter" && addSemester() }), h("span", null), h("button", { className: "btn btn-dark btn-sm", onClick: addSemester }, "Create")),
      h("div", { className: "rows" }, state.semesters.map(s => h("div", { key: s.id, className: "semester-row" },
        h("div", { className: "main-info" }, h("div", { className: "row-title" }, s.name + (s.id === state.activeSem ? " · Active" : "")), h("input", { className: "input", style: { marginTop: 8, maxWidth: 250 }, value: renameMap[s.id] || "", onChange: e => setRenameMap(p => ({ ...p, [s.id]: e.target.value })), onKeyDown: e => e.key === "Enter" && renameSemester(s.id) })),
        h("div", { className: "row-actions" }, h("button", { className: "btn btn-sm", onClick: () => renameSemester(s.id) }, "Rename"), s.id !== state.activeSem && h("button", { className: "btn btn-sm", onClick: () => update(p => ({ ...p, activeSem: s.id })) }, "Switch"), h("button", { className: "btn btn-sm", onClick: () => resetSemester(s.id) }, "Reset"), state.semesters.length > 1 && h("button", { className: "btn btn-sm btn-danger", onClick: () => deleteSemester(s.id) }, "Delete"))
      ))),
      h("div", { className: "card danger-zone" }, h("div", { className: "row-title", style: { marginBottom: 8 } }, "Danger Zone"), h("p", { className: "helper-text" }, "This permanently clears everything saved in this browser for the tracker."), h("button", { className: "btn btn-danger", onClick: resetEverything }, "Reset Entire Tracker"))
    )
  );
}

ReactDOM.render(h(App), document.getElementById("root"));
</script>
