<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innovative Design at USC Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Victor+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --bg: #fbfbfa;
      --ink: #444142;
      --muted: #8b8788;
      --line: #aaa4a6;
      --soft-line: #dedadb;
      --pill: #ffffff;
      --dark: #403d3e;
      --danger: #ff4f4f;
      --danger-soft: #fff3f3;
      --success: #e7f7e8;
      --warn: #fff7de;
      --shadow: 0 2px 0 rgba(0,0,0,0.03);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Fragment Mono", monospace;
      font-size: 13px;
    }

    /* Victor Mono = all headings/labels/navigation/buttons */
    h1, h2, h3, h4,
    .app-title, .nav-btn, .section-title, .card-title,
    .label, label, button, .btn, .chip, .tag, .table th,
    .filter-select, .avatar, .profile-name {
      font-family: "Victor Mono", monospace;
    }

    /* Fragment Mono = all body/data text */
    input, select, textarea, .body-text, .member-name, .member-meta,
    .profile-value, .table td, .helper, .empty, .points-text,
    .fam-title, .fam-meta, .activity-text, .points-big {
      font-family: "Fragment Mono", monospace;
    }

    .page {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      padding: 42px 0 80px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 44px;
    }
    .app-title {
      font-size: clamp(26px, 3.2vw, 43px);
      font-weight: 500;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .nav-btn {
      border: 0;
      background: transparent;
      color: var(--ink);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      padding: 2px 0;
      border-bottom: 1px solid transparent;
    }
    .nav-btn.active { border-bottom-color: var(--ink); }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill, input, select {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--pill);
      color: var(--ink);
      padding: 0 16px;
      outline: none;
      font-size: 12px;
    }
    select { text-align: center; text-align-last: center; cursor: pointer; }
    input::placeholder { color: #c5c0c1; text-transform: uppercase; text-align: center; }
    .compact { width: 170px; text-align: center; }
    .tiny { width: 120px; text-align: center; }

    .btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      padding: 0 16px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #f0eeee; }
    .btn-dark { background: var(--dark); color: white; border-color: var(--dark); }
    .btn-dark:hover { background: #2c2a2a; }
    .btn-danger { color: var(--danger); border-color: var(--danger); background: white; }
    .btn-sm { min-height: 28px; padding: 0 12px; font-size: 10px; }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 14px;
      background: white;
      color: var(--ink);
    }
    .notice.error { background: var(--danger-soft); color: #b20f0f; border-color: #ffc0c0; }
    .notice.success { background: var(--success); color: #25612c; border-color: #b7e3bb; }
    .notice.warn { background: var(--warn); color: #7b5c00; border-color: #ead28a; }

    .grid { display: grid; gap: 16px; }
    .two-col { grid-template-columns: 1.1fr 0.9fr; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }
    .helper { color: var(--muted); line-height: 1.5; margin-bottom: 12px; font-size: 12px; }
    .empty { color: var(--muted); text-align: center; padding: 42px 0; }

    /* ── Members page toolbar (matches mockup: 2-row grid) ── */
    .members-controls {
      display: grid;
      grid-template-columns: 160px 160px 160px 160px minmax(280px, 1fr);
      column-gap: 24px;
      row-gap: 14px;
      align-items: center;
      margin-bottom: 34px;
    }
    .members-controls > select,
    .members-controls > input.search {
      width: 100%;
      height: 42px;
      min-height: 42px;
      font-size: 13px;
      text-align: center;
    }
    .members-controls > select { font-family: "Victor Mono", monospace; text-transform: uppercase; }
    .members-controls > .filter-sort { background: var(--dark); color: white; border-color: var(--dark); }
    .members-controls > .search {
      grid-column: 5 / 6;
      font-family: "Fragment Mono", monospace;
    }
    .members-controls > .quick-add {
      grid-column: 3 / 6;
      grid-row: 2;
    }

    .quick-add {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.72);
      width: 100%;
      min-width: 0;
    }
    .quick-add .compact { width: 170px; }
    .quick-add .tiny { width: 120px; }

    .check-stack { display: grid; grid-template-columns: 1fr; gap: 2px; min-width: 95px; }
    .check-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: "Victor Mono", monospace;
      font-size: 11px;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
    }
    .check-wrap input { width: 14px; height: 14px; min-height: auto; padding: 0; accent-color: var(--dark); border-radius: 0; }

    .member-list, .task-list, .activity-list { display: grid; gap: 14px; }
    .member-card {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto auto;
      gap: 18px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      background: white;
      width: 100%;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--dark);
      color: white;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: -0.06em;
      flex: 0 0 auto;
    }
    .avatar-lg { width: 74px; height: 74px; font-size: 27px; }
    .member-name {
      font-size: 24px;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 8px;
    }
    .tag-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 23px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      font-size: 10px;
      text-transform: none;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .points-big {
      font-family: "Fragment Mono", monospace;
      font-size: 16px;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 400;
    }
    .row-actions { display: flex; gap: 10px; align-items: center; }
    .member-card .points-big { font-size: 22px; letter-spacing: -0.05em; }

    /* ── Leaderboard / fam cards (matches mockup) ── */
    .leaderboard-grid { display: grid; gap: 20px; }
    .fam-card {
      border-radius: 12px;
      border: 0;
      padding: 22px 26px;
      display: grid;
      gap: 14px;
    }
    .fam-top { display: flex; align-items: baseline; justify-content: space-between; gap: 18px; }
    .fam-title {
      font-family: "Victor Mono", monospace;
      font-size: clamp(24px, 2.6vw, 32px);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      color: var(--ink);
    }
    .fam-card .points-big {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.02em;
      white-space: nowrap;
      color: var(--ink);
    }
    .fam-bar-wrap { height: 9px; border-radius: 999px; background: rgba(255,255,255,0.55); overflow: hidden; }
    .fam-bar { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

    .fam-members-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .fam-members-list { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; min-width: 0; }
    .fam-member-chip { display: flex; align-items: center; gap: 7px; font-size: 11px; white-space: nowrap; }
    .chip-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: grid; place-items: center;
      font-family: "Victor Mono", monospace;
      font-size: 9px; color: #fff; flex: 0 0 auto;
    }
    .fam-count {
      font-family: "Victor Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--ink);
      white-space: nowrap;
    }

    .task-row, .activity-row, .semester-row, .fam-edit-row {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .fam-edit-row { padding: 6px 8px 6px 16px; }
    .fam-edit-row input { flex: 1; min-width: 0; }
    .fam-swatch { width: 18px; height: 18px; border-radius: 50%; flex: 0 0 auto; border: 1px solid rgba(0,0,0,0.08); }
    .task-main, .activity-main { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .task-name { text-transform: uppercase; }
    .muted { color: var(--muted); }

    .table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .table th {
      text-align: left;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 500;
      padding: 9px 8px;
      border-bottom: 1px solid var(--soft-line);
    }
    .table td { padding: 11px 8px; border-bottom: 1px solid #eee; }
    .table tr:last-child td { border-bottom: 0; }

    .profile-layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; align-items: start; }
    .profile-name {
      font-size: 34px;
      line-height: 0.95;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      margin: 16px 0 12px;
    }
    .profile-stat-grid { display: grid; gap: 10px; margin-top: 16px; }
    .profile-stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }
    .label { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 6px; }
    .profile-value { font-size: 13px; }

    .bulk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 12px 0; }
    .select-member {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: white;
      cursor: pointer;
    }
    .select-member input { width: auto; min-height: auto; accent-color: var(--dark); }

    .danger-zone { border-color: #ffb6b6; background: #fffafa; margin-top: 20px; }

    @media (max-width: 980px) {
      .members-controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .members-controls > .search,
      .members-controls > .quick-add { grid-column: 1 / -1; grid-row: auto; }
      .members-controls > select { width: 100%; }
      .members-controls > .quick-add { flex-wrap: wrap; justify-content: flex-start; border-radius: 22px; }
    }

    @media (max-width: 860px) {
      .page { width: min(100% - 28px, 1120px); padding-top: 26px; }
      .topbar { align-items: flex-start; flex-direction: column; gap: 18px; }
      .nav { justify-content: flex-start; gap: 18px; }
      .two-col, .profile-layout { grid-template-columns: 1fr; }
      .member-card { grid-template-columns: 44px 1fr; }
      .points-big, .row-actions { grid-column: 2; }
      .quick-add > * { flex: 1 1 160px; width: 100%; }
      .quick-add { flex-wrap: wrap; border-radius: 22px; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script>
const { useEffect, useMemo, useState } = React;
const h = React.createElement;

// ─────────────────────────────────────────────
//  Supabase config
//  Paste your project URL + publishable key below.
// ─────────────────────────────────────────────
const SUPABASE_URL = "https://uvryklpzzblpuozbpwhs.supabase.co";
const SUPABASE_KEY = "sb_publishable_0PJFkT3SxMFdqkA98r_b6Q_8aS9q_fR";
const USE_SUPABASE = SUPABASE_URL.startsWith("https://") && !SUPABASE_KEY.startsWith("YOUR_");
const db = USE_SUPABASE ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const LOCAL_KEY = "innod_tracker_v3_fall2026";

// Fams are no longer locked to 4 fixed slots — any number of fams can be
// added or removed per semester. New fams cycle through this palette.
const COLOR_PALETTE = [
  { key: "blue",   bg: "#E6ECFF", bar: "#7B8FD9" },
  { key: "tan",    bg: "#FFF3D8", bar: "#B9A070" },
  { key: "green",  bg: "#E5F8E6", bar: "#7AAE75" },
  { key: "red",    bg: "#FFE5E8", bar: "#B76C73" },
  { key: "purple", bg: "#F1E6FF", bar: "#9B7BD9" },
  { key: "teal",   bg: "#E0F7F5", bar: "#5FA8A0" },
  { key: "orange", bg: "#FFEAD6", bar: "#D98F4E" },
  { key: "pink",   bg: "#FFE6F2", bar: "#D97BA8" }
];
function colorFor(idx) { return COLOR_PALETTE[idx % COLOR_PALETTE.length]; }
function famMeta(colorKey) { return COLOR_PALETTE.find(c => c.key === colorKey) || COLOR_PALETTE[0]; }

const STARTER_FAMS = [
  { name: "Maple Fam",   color_key: "blue" },
  { name: "Willow Fam",  color_key: "tan" },
  { name: "Cypress Fam", color_key: "green" },
  { name: "Aspen Fam",   color_key: "red" }
];

const DEFAULT_LOCAL = {
  semesters: [{ id: "fall2026", name: "Fall 2026", is_active: true }],
  fams: STARTER_FAMS.map((f, i) => ({ id: "fam" + (i + 1), semester_id: "fall2026", slot: i + 1, name: f.name, color_key: f.color_key })),
  members: [],
  member_semesters: [],
  tasks: [],
  completions: [],
  point_submissions: [],
  point_submission_items: [],
  point_submission_item_members: [],
  point_submission_item_fam_counts: [],
  fam_point_logs: []
};

function uid(prefix="id") { return prefix + "_" + Math.random().toString(36).slice(2, 10); }
function today() { return new Date().toISOString().slice(0, 10); }
function initials(name="") { return name.trim().split(/\s+/).map(w => w[0] || "").join("").slice(0, 2).toUpperCase() || "?"; }
function safeName(s) { return (s || "").trim(); }

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY)) || DEFAULT_LOCAL; }
  catch { return DEFAULT_LOCAL; }
}
function saveLocal(data) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); } catch {}
}

// ============================================================
//  APP SHELL / ROUTING
//  Handles global state, Supabase/local loading, navigation,
//  and decides which page to render.
// ============================================================
function App() {
  const [tab, setTab] = useState("leaderboard");
  const [data, setData] = useState(DEFAULT_LOCAL);
  const [activeSemId, setActiveSemId] = useState("fall2026");
  const [flash, setFlash] = useState(null);
  const [loading, setLoading] = useState(true);
  const [profileId, setProfileId] = useState(null);

  useEffect(() => { loadAll(); }, []);

  async function loadAll() {
    setLoading(true);
    try {
      if (USE_SUPABASE) {
        const [
          semesters,
          fams,
          members,
          memberSemesters,
          tasks,
          completions,
          submissions,
          submissionItems,
          submissionMembers,
          submissionCounts,
          famPointLogs
        ] = await Promise.all([
          db.from("semesters").select("*").order("created_at", { ascending: true }),
          db.from("fams").select("*").order("slot", { ascending: true }),
          db.from("members").select("*").order("name", { ascending: true }),
          db.from("member_semesters").select("*"),
          db.from("tasks").select("*").order("name", { ascending: true }),
          db.from("completions").select("*").order("date", { ascending: false }),
          db.from("point_submissions").select("*").order("created_at", { ascending: false }),
          db.from("point_submission_items").select("*"),
          db.from("point_submission_item_members").select("*"),
          db.from("point_submission_item_fam_counts").select("*"),
          db.from("fam_point_logs").select("*")
        ]);
        const errs = [
          semesters,
          fams,
          members,
          memberSemesters,
          tasks,
          completions,
          submissions,
          submissionItems,
          submissionMembers,
          submissionCounts,
          famPointLogs
        ].filter(r => r.error);
        if (errs.length) throw errs[0].error;

        let next = {
          semesters: semesters.data || [],
          fams: fams.data || [],
          members: members.data || [],
          member_semesters: memberSemesters.data || [],
          tasks: tasks.data || [],
          completions: completions.data || [],
          point_submissions: submissions.data || [],
          point_submission_items: submissionItems.data || [],
          point_submission_item_members: submissionMembers.data || [],
          point_submission_item_fam_counts: submissionCounts.data || [],
          fam_point_logs: famPointLogs.data || []
        };

        if (next.semesters.length === 0) {
          await seedFall2026();
          return loadAll();
        }

        const active = next.semesters.find(s => s.is_active) || next.semesters[0];
        setActiveSemId(active.id);
        setData(next);
      } else {
        const local = loadLocal();
        setData(local);
        setActiveSemId((local.semesters.find(s => s.is_active) || local.semesters[0]).id);
      }
    } catch (e) {
      console.error(e);
      showFlash("Supabase error: " + e.message + ". Using local preview data if available.", "error");
      const local = loadLocal();
      setData(local);
      setActiveSemId((local.semesters.find(s => s.is_active) || local.semesters[0]).id);
    } finally {
      setLoading(false);
    }
  }

  async function seedFall2026() {
    const semId = "fall2026";
    await db.from("semesters").insert({ id: semId, name: "Fall 2026", is_active: true });
    await db.from("fams").insert(STARTER_FAMS.map((f, i) => ({ semester_id: semId, slot: i + 1, name: f.name, color_key: f.color_key })));
  }

  function showFlash(msg, type="success") {
    setFlash({ msg, type });
    setTimeout(() => setFlash(null), 3500);
  }

  async function mutateLocal(fn) {
    const next = fn(data);
    setData(next);
    saveLocal(next);
    return next;
  }

  const activeSem = data.semesters.find(s => s.id === activeSemId) || data.semesters[0] || { id: activeSemId, name: "Fall 2026" };
  const activeFams = data.fams.filter(f => f.semester_id === activeSemId).sort((a,b) => (a.slot || 0) - (b.slot || 0));
  const getFam = (famId) => data.fams.find(f => f.id === famId) || null;
  const getMemberSem = (memberId, semId = activeSemId) => data.member_semesters.find(ms => ms.member_id === memberId && ms.semester_id === semId) || null;
  const memberPoints = (memberId, semId = activeSemId) => data.completions
    .filter(c => c.member_id === memberId && c.semester_id === semId)
    .reduce((sum, c) => sum + (data.tasks.find(t => t.id === c.task_id)?.points || 0), 0);
  const lifetimePoints = (memberId) => data.completions
    .filter(c => c.member_id === memberId)
    .reduce((sum, c) => sum + (data.tasks.find(t => t.id === c.task_id)?.points || 0), 0);
  const famPoints = (famId) => {
  const memberBasedPoints = data.members
    .filter(m => getMemberSem(m.id)?.fam_id === famId)
    .reduce((sum, m) => sum + memberPoints(m.id), 0);

  const logBasedPoints = (data.fam_point_logs || [])
    .filter(log => log.fam_id === famId && log.semester_id === activeSemId)
    .reduce((sum, log) => sum + Number(log.total_points || 0), 0);

  return memberBasedPoints + logBasedPoints;
};

  const api = {
    data, setData, activeSem, activeSemId, setActiveSemId, activeFams,
    showFlash, loadAll, mutateLocal, getFam, getMemberSem, memberPoints, lifetimePoints, famPoints,
    setTab, setProfileId
  };

  const TABS = [
    ["leaderboard", "Home"],
    ["members", "Members"],
    ["tasks", "Tasks"],
    ["activities", "Log Points"],
    ["pending", "Pending Logs"],
    ["settings", "Settings"]
  ];

  if (loading) return h("main", { className: "page" }, h("div", { className: "empty" }, "Loading tracker…"));

  return h("main", { className: "page" },
    h("header", { className: "topbar" },
      h("h1", { className: "app-title" }, "Innovative Design at USC"),
      h("nav", { className: "nav" },
        TABS.map(([key, label]) => h("button", {
          key, className: "nav-btn" + (!profileId && tab === key ? " active" : ""),
          onClick: () => { setTab(key); setProfileId(null); }
        }, label))
      )
    ),
    flash && h("div", { className: "notice " + flash.type }, flash.msg),
    !USE_SUPABASE && h("div", { className: "notice warn" }, "Preview mode: Supabase is not connected. Data is saved only in this browser."),
    profileId ? h(ProfilePage, { ...api, member: data.members.find(m => m.id === profileId) }) :
      tab === "leaderboard" ? h(Leaderboard, api) :
      tab === "members" ? h(MembersPage, api) :
      tab === "tasks" ? h(TasksPage, api) :
      tab === "activities" ? h(ActivitiesPage, api) :
      tab === "pending" ? h(PendingLogsPage, api) :
      h(SettingsPage, api)
  );
}

// ============================================================

      const meta = famMeta(f.color_key);

      const ranked_members = [...members].sort((a,b) => api.memberPoints(b.id) - api.memberPoints(a.id));

      return h("div", { key: f.id, className: "fam-card", style: { background: meta.bg } },

        h("div", { className: "fam-members-row" },

            preview.length

// ============================================================
//  PAGE: MEMBERS
//  Member filters, search, quick-add member form,
//  member cards, profile/delete actions.
// ============================================================
function MembersPage(api) {
  const [sort, setSort] = useState("points");
  const [famFilter, setFamFilter] = useState("all");
  const [hexFilter, setHexFilter] = useState("all");
  const [driverFilter, setDriverFilter] = useState("all");
  const [headFilter, setHeadFilter] = useState("all");
  const [search, setSearch] = useState("");

  const [name, setName] = useState("");
  const [hex, setHex] = useState("");
  const [famId, setFamId] = useState(api.activeFams[0]?.id || "");
  const [isDriver, setIsDriver] = useState(false);
  const [isFamHead, setIsFamHead] = useState(false);

  useEffect(() => { if (!api.activeFams.find(f => f.id === famId)) setFamId(api.activeFams[0]?.id || ""); }, [api.activeSemId, api.activeFams.length]);

  const hexClasses = [...new Set(api.data.members.map(m => m.hex_class).filter(Boolean))].sort();

  const members = api.data.members.filter(m => {
    const ms = api.getMemberSem(m.id);
    const q = search.trim().toLowerCase();
    if (q && !(m.name || "").toLowerCase().includes(q) && !(m.hex_class || "").toLowerCase().includes(q)) return false;
    if (famFilter !== "all" && ms?.fam_id !== famFilter) return false;
    if (hexFilter !== "all" && m.hex_class !== hexFilter) return false;
    if (driverFilter === "drivers" && !m.is_driver) return false;
    if (driverFilter === "nondrivers" && m.is_driver) return false;
    if (headFilter === "heads" && !ms?.is_fam_head) return false;
    if (headFilter === "nonheads" && ms?.is_fam_head) return false;
    return true;
  }).sort((a,b) => {
    if (sort === "name") return a.name.localeCompare(b.name);
    if (sort === "fam") return (api.getFam(api.getMemberSem(a.id)?.fam_id)?.name || "").localeCompare(api.getFam(api.getMemberSem(b.id)?.fam_id)?.name || "");
    return api.memberPoints(b.id) - api.memberPoints(a.id);
  });

  async function addMember() {
    if (!safeName(name)) return api.showFlash("Full name is required", "error");
    if (USE_SUPABASE) {
      const { data: member, error } = await db.from("members").insert({ name: safeName(name), hex_class: safeName(hex), is_driver: isDriver }).select().single();
      if (error) return api.showFlash(error.message, "error");
      const { error: msErr } = await db.from("member_semesters").insert({ member_id: member.id, semester_id: api.activeSemId, fam_id: famId || null, is_fam_head: isFamHead });
      if (msErr) return api.showFlash(msErr.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => {
        const id = uid("mem");
        return { ...d, members: [...d.members, { id, name: safeName(name), hex_class: safeName(hex), is_driver: isDriver }], member_semesters: [...d.member_semesters, { id: uid("ms"), member_id: id, semester_id: api.activeSemId, fam_id: famId || null, is_fam_head: isFamHead }] };
      });
    }
    api.showFlash("Member added");
    setName(""); setHex(""); setIsDriver(false); setIsFamHead(false);
  }

  async function deleteMember(id) {
    if (!confirm("Delete this member? This removes their profile and all point history.")) return;
    if (USE_SUPABASE) {
      const { error } = await db.from("members").delete().eq("id", id);
      if (error) return api.showFlash(error.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({ ...d, members: d.members.filter(m => m.id !== id), member_semesters: d.member_semesters.filter(ms => ms.member_id !== id), completions: d.completions.filter(c => c.member_id !== id) }));
    }
    api.showFlash("Member deleted");
  }

  return h("section", null,
    h("div", { className: "section-head" }, h("h2", { className: "section-title" }, "Members")),
    h("div", { className: "members-controls" },
      h("select", { className: "filter-sort", value: sort, onChange: e => setSort(e.target.value) }, h("option", { value: "points" }, "Sort By"), h("option", { value: "points" }, "Points"), h("option", { value: "name" }, "Name"), h("option", { value: "fam" }, "Fam")),
      h("select", { value: famFilter, onChange: e => setFamFilter(e.target.value) }, h("option", { value: "all" }, "Fam"), api.activeFams.map(f => h("option", { key: f.id, value: f.id }, f.name))),
      h("select", { value: hexFilter, onChange: e => setHexFilter(e.target.value) }, h("option", { value: "all" }, "Hex Class"), hexClasses.map(x => h("option", { key: x, value: x }, x))),
      h("select", { value: driverFilter, onChange: e => setDriverFilter(e.target.value) }, h("option", { value: "all" }, "Driver"), h("option", { value: "drivers" }, "Drivers"), h("option", { value: "nondrivers" }, "Non Drivers")),
      h("input", { className: "search", value: search, onChange: e => setSearch(e.target.value), placeholder: "Search" }),
      h("select", { value: headFilter, onChange: e => setHeadFilter(e.target.value) }, h("option", { value: "all" }, "Fam Head"), h("option", { value: "heads" }, "Fam Heads"), h("option", { value: "nonheads" }, "Non Heads")),
      h(InlineSemesterDropdown, api),
      h("div", { className: "quick-add" },
        h("input", { className: "compact", value: name, onChange: e => setName(e.target.value), placeholder: "Full Name" }),
        h("input", { className: "tiny", value: hex, onChange: e => setHex(e.target.value), placeholder: "Hex Class" }),
        h("select", { className: "tiny", value: famId, onChange: e => setFamId(e.target.value) }, h("option", { value: "" }, "Fam"), api.activeFams.map(f => h("option", { key: f.id, value: f.id }, f.name))),
        h("div", { className: "check-stack" },
          h("label", { className: "check-wrap" }, h("input", { type: "checkbox", checked: isFamHead, onChange: e => setIsFamHead(e.target.checked) }), "Fam Head"),
          h("label", { className: "check-wrap" }, h("input", { type: "checkbox", checked: isDriver, onChange: e => setIsDriver(e.target.checked) }), "Driver")
        ),
        h("button", { className: "btn btn-dark", onClick: addMember }, "Add Member")
      )
    ),
    h("div", { className: "member-list" },
      members.length === 0 && h("div", { className: "empty" }, "No members yet."),
      members.map(m => h(MemberCard, { key: m.id, member: m, api, onDelete: deleteMember }))
    )
  );
}

// ============================================================
//  PAGE: TASKS
//  Create, edit, and delete point-value tasks.
// ============================================================
function TasksPage(api) {
  const [name, setName] = useState("");
  const [points, setPoints] = useState("");
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editPoints, setEditPoints] = useState("");

  async function addTask() {
    if (!safeName(name) || !Number(points)) return api.showFlash("Enter task name and point value", "error");
    if (USE_SUPABASE) {
      const { error } = await db.from("tasks").insert({ name: safeName(name), points: Number(points) });
      if (error) return api.showFlash(error.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({ ...d, tasks: [...d.tasks, { id: uid("task"), name: safeName(name), points: Number(points) }] }));
    }
    setName(""); setPoints(""); api.showFlash("Task added");
  }

  async function saveTask(id) {
    if (!safeName(editName) || !Number(editPoints)) return api.showFlash("Enter task name and point value", "error");
    if (USE_SUPABASE) {
      const { error } = await db.from("tasks").update({ name: safeName(editName), points: Number(editPoints) }).eq("id", id);
      if (error) return api.showFlash(error.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, name: safeName(editName), points: Number(editPoints) } : t) }));
    }
    setEditId(null); api.showFlash("Task updated");
  }

  async function deleteTask(id) {
    if (!confirm("Delete this task? Its logged points will also be removed.")) return;
    if (USE_SUPABASE) {
      const { error } = await db.from("tasks").delete().eq("id", id);
      if (error) return api.showFlash(error.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id), completions: d.completions.filter(c => c.task_id !== id) }));
    }
    api.showFlash("Task deleted");
  }

  return h("section", null,
    h("div", { className: "section-head" }, h("h2", { className: "section-title" }, "Tasks")),
    h("div", { className: "quick-add", style: { justifyContent: "flex-start", marginBottom: 20 } },
      h("span", { className: "card-title", style: { margin: 0, whiteSpace: "nowrap" } }, "Add Task"),
      h("input", { className: "compact", value: name, onChange: e => setName(e.target.value), placeholder: "Task Name" }),
      h("input", { className: "tiny", type: "number", min: 1, value: points, onChange: e => setPoints(e.target.value), placeholder: "Point Value" }),
      h("button", { className: "btn btn-dark", onClick: addTask }, "Add")
    ),
    h("div", { className: "task-list" },
      api.data.tasks.length === 0 && h("div", { className: "empty" }, "No tasks yet."),
      api.data.tasks.map(t => h("div", { key: t.id, className: "task-row" },
        editId === t.id ? h("div", { className: "task-main", style: { flex: 1 } },
          h("input", { value: editName, onChange: e => setEditName(e.target.value) }),
          h("input", { type: "number", min: 1, value: editPoints, onChange: e => setEditPoints(e.target.value) })
        ) : h("div", { className: "task-main" }, h("span", { className: "task-name" }, t.name), h("span", { className: "muted" }, t.points + " Points")),
        h("div", { className: "row-actions" },
          editId === t.id ? h("button", { className: "btn btn-sm", onClick: () => saveTask(t.id) }, "Save") : h("button", { className: "btn btn-sm", onClick: () => { setEditId(t.id); setEditName(t.name); setEditPoints(String(t.points)); } }, "Edit"),
          h("button", { className: "btn btn-sm btn-danger", onClick: () => deleteTask(t.id) }, "X")
        )
      ))
    )
  );
}

// ============================================================
//  PAGE: ACTIVITIES / LOG POINTS
//  Single award + bulk award workflows for assigning points.
// ============================================================
function ActivitiesPage(api) {
  const [mode, setMode] = useState("bulk");
  const [memberId, setMemberId] = useState("");
  const [taskId, setTaskId] = useState("");
  const [date, setDate] = useState(today());
  const [selected, setSelected] = useState([]);

  const assignedMembers = api.data.members.filter(m => api.getMemberSem(m.id)?.fam_id);

  async function insertCompletions(rows) {
    if (!rows.length) return;
    if (USE_SUPABASE) {
      const { error } = await db.from("completions").insert(rows);
      if (error) return api.showFlash(error.message, "error");
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({ ...d, completions: [...d.completions, ...rows.map(r => ({ ...r, id: uid("comp") }))] }));
    }
    api.showFlash("Points assigned");
  }

  function assignSingle() {
    if (!memberId || !taskId || !date) return api.showFlash("Select member, task, and date", "error");
    insertCompletions([{ member_id: memberId, task_id: taskId, semester_id: api.activeSemId, date }]);
    setMemberId("");
  }

  function assignBulk() {
    if (!taskId || !date || selected.length === 0) return api.showFlash("Select a task and at least one member", "error");
    insertCompletions(selected.map(id => ({ member_id: id, task_id: taskId, semester_id: api.activeSemId, date })));
    setSelected([]);
  }

  const recent = [...api.data.completions].filter(c => c.semester_id === api.activeSemId).slice(0, 20);

  return h("section", null,
    h("div", { className: "section-head" }, h("h2", { className: "section-title" }, "Log Points"), h(SemesterPicker, api)),
    h("div", { className: "controls" },
      h("button", { className: "btn " + (mode === "bulk" ? "btn-dark" : ""), onClick: () => setMode("bulk") }, "Bulk Award"),
      h("button", { className: "btn " + (mode === "single" ? "btn-dark" : ""), onClick: () => setMode("single") }, "Single Award")
    ),
    mode === "single" ? h("div", { className: "card" },
      h("div", { className: "card-title" }, "Single Award"),
      h("div", { className: "controls" },
        h("select", { value: memberId, onChange: e => setMemberId(e.target.value) }, h("option", { value: "" }, "Member"), assignedMembers.map(m => h("option", { key: m.id, value: m.id }, m.name))),
        h("select", { value: taskId, onChange: e => setTaskId(e.target.value) }, h("option", { value: "" }, "Task"), api.data.tasks.map(t => h("option", { key: t.id, value: t.id }, t.name + " (+" + t.points + ")"))),
        h("input", { type: "date", value: date, onChange: e => setDate(e.target.value) }),
        h("button", { className: "btn btn-dark", onClick: assignSingle }, "Assign")
      )
    ) : h("div", { className: "card" },
      h("div", { className: "card-title" }, "Bulk Award"),
      h("p", { className: "helper" }, "Choose one task, select every member who completed it, then assign points to everyone at once."),
      h("div", { className: "controls" },
        h("select", { value: taskId, onChange: e => setTaskId(e.target.value) }, h("option", { value: "" }, "Task"), api.data.tasks.map(t => h("option", { key: t.id, value: t.id }, t.name + " (+" + t.points + ")"))),
        h("input", { type: "date", value: date, onChange: e => setDate(e.target.value) }),
        h("button", { className: "btn", onClick: () => setSelected(assignedMembers.map(m => m.id)) }, "Select All"),
        h("button", { className: "btn", onClick: () => setSelected([]) }, "Clear"),
        h("button", { className: "btn btn-dark", onClick: assignBulk }, "Assign To " + selected.length + " Members")
      ),
      h("div", { className: "bulk-grid" }, assignedMembers.map(m => {
        const checked = selected.includes(m.id);
        const fam = api.getFam(api.getMemberSem(m.id)?.fam_id);
        return h("label", { key: m.id, className: "select-member" },
          h("input", { type: "checkbox", checked, onChange: e => setSelected(prev => e.target.checked ? [...prev, m.id] : prev.filter(id => id !== m.id)) }),
          h("span", null, m.name),
          h("span", { className: "muted" }, fam ? fam.name : "")
        );
      }))
    ),
    h("div", { className: "card", style: { marginTop: 16 } },
      h("div", { className: "card-title" }, "Recent Activity"),
      recent.length === 0 ? h("div", { className: "empty" }, "No activity logged yet.") : h(ActivityTable, { api, rows: recent })
    )
  );
}

// ============================================================
//  PAGE: MEMBER PROFILE
//  Shows one member’s permanent info, semester history,
//  lifetime points, and full point log.
// ============================================================
function ProfilePage(api) {
  const m = api.member;
  if (!m) return h("div", { className: "empty" }, "Member not found.");
  const ms = api.getMemberSem(m.id);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState(null);
  const history = api.data.completions.filter(c => c.member_id === m.id);

  function startEdit() {
    setForm({
      name: m.name,
      hex_class: m.hex_class || "",
      is_driver: !!m.is_driver,
      fam_id: ms?.fam_id || "",
      is_fam_head: !!ms?.is_fam_head
    });
    setEditing(true);
  }

  async function saveEdit() {
    if (!safeName(form.name)) return api.showFlash("Name is required", "error");
    const memberPatch = { name: safeName(form.name), hex_class: safeName(form.hex_class), is_driver: form.is_driver };
    const semPatch = { fam_id: form.fam_id || null, is_fam_head: form.is_fam_head };
    if (USE_SUPABASE) {
      const { error: mErr } = await db.from("members").update(memberPatch).eq("id", m.id);
      if (mErr) return api.showFlash(mErr.message, "error");
      if (ms) {
        const { error: msErr } = await db.from("member_semesters").update(semPatch).eq("id", ms.id);
        if (msErr) return api.showFlash(msErr.message, "error");
      } else {
        const { error: insErr } = await db.from("member_semesters").insert({ member_id: m.id, semester_id: api.activeSemId, ...semPatch });
        if (insErr) return api.showFlash(insErr.message, "error");
      }
      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        members: d.members.map(x => x.id === m.id ? { ...x, ...memberPatch } : x),
        member_semesters: ms
          ? d.member_semesters.map(x => x.id === ms.id ? { ...x, ...semPatch } : x)

async function updateSubmissionStatus(api, submission, status) {
  const { error } = await db
    .from("point_submissions")
    .update({
      status,
      reviewed_at: new Date().toISOString()
    })
    .eq("id", submission.id);

  if (error) return api.showFlash(error.message, "error");

  await api.loadAll();
  api.showFlash("Submission updated");
}

async function approveSubmission(api, submission) {
  const items = api.data.point_submission_items
    .filter(i => i.submission_id === submission.id);

  for (const item of items) {
    const task = api.data.tasks.find(t => t.id === item.final_task_id);
    if (!task) continue;

    const counts = api.data.point_submission_item_fam_counts
      .filter(c => c.item_id === item.id && Number(c.member_count) > 0);

    const rows = counts.map(c => ({
      submission_item_id: item.id,
      fam_id: c.fam_id,
      task_id: item.final_task_id,
      member_count: Number(c.member_count),
      points_per_member: Number(task.points),
      total_points: Number(c.member_count) * Number(task.points),
      semester_id: submission.semester_id
    }));

    if (rows.length) {
      const { error } = await db.from("fam_point_logs").insert(rows);
      if (error) return api.showFlash(error.message, "error");
    }

    const alreadyLoggedMembers = new Set(
      (api.data.completions || [])
        .filter(c => c.task_id === item.final_task_id && c.semester_id === submission.semester_id)
        .map(c => c.member_id + "|" + c.task_id + "|" + c.date)
    );

    const todayStr = new Date().toISOString().slice(0, 10);

    const memberRows = (api.data.point_submission_item_members || [])
      .filter(row => row.item_id === item.id)
      .filter(row => !alreadyLoggedMembers.has(row.member_id + "|" + item.final_task_id + "|" + todayStr))
      .map(row => ({
        member_id: row.member_id,
        task_id: item.final_task_id,
        semester_id: submission.semester_id,
        date: todayStr
      }));

    if (memberRows.length) {
      const { error } = await db.from("completions").insert(memberRows);
      if (error) return api.showFlash(error.message, "error");
    }
  }

  await updateSubmissionStatus(api, submission, "approved");
}

async function updateItemTask(api, itemId, taskId) {
  const { error } = await db
    .from("point_submission_items")
    .update({ final_task_id: taskId || null })
    .eq("id", itemId);

  if (error) return api.showFlash(error.message, "error");
  await api.loadAll();
}

async function updateFamCount(api, countRow, newCount) {
  const { error } = await db
    .from("point_submission_item_fam_counts")
    .update({ member_count: Math.max(0, Number(newCount) || 0) })
    .eq("id", countRow.id);

  if (error) return api.showFlash(error.message, "error");
  await api.loadAll();
}

async function createMissingCount(api, itemId, famId) {
  const { error } = await db
    .from("point_submission_item_fam_counts")
    .insert({ item_id: itemId, fam_id: famId, member_count: 0 });

  if (error) return api.showFlash(error.message, "error");
  await api.loadAll();
}

function PendingLogsPage(api) {
  const submissions = (api.data.point_submissions || [])
  .filter(s => ["pending", "appealed"].includes(s.status))
  .sort((a, b) => {
    if (a.status === "appealed" && b.status !== "appealed") return -1;
    if (a.status !== "appealed" && b.status === "appealed") return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  return h("section", null,
    h("div", { className: "section-head" },
      h("h2", { className: "section-title" }, "Pending Logs")
    ),

    submissions.length === 0 && h("div", { className: "empty" }, "No pending logs."),

    submissions.map(sub => {
      const items = api.data.point_submission_items
        .filter(i => i.submission_id === sub.id);

      return h("div", { key: sub.id, className: "card", style: { marginBottom: 18 } },
        h("div", { className: "card-title" },
          sub.status === "appealed" ? "Appealed Submission" :
          sub.status === "rejected" ? "Rejected Submission" :
          "Pending Submission"
        ),

        h("p", { className: "helper" }, sub.caption || "No caption"),

        h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 } },
          (sub.image_urls || []).map(url =>
            h("img", {
              key: url,
              src: url,
              style: {
                width: "150px",
                height: "150px",
                objectFit: "cover",
                borderRadius: "12px",
                border: "1px solid var(--line)"
              }
            })
          )
        ),

        items.map(item => h(PendingItemEditor, { key: item.id, api, item })),

        h("div", { className: "row-actions", style: { marginTop: 14 } },
          h("button", {
            className: "btn btn-dark",
            onClick: () => approveSubmission(api, sub)
          }, "Approve"),

          h("button", {
            className: "btn btn-danger",
            onClick: () => updateSubmissionStatus(api, sub, "rejected")
          }, "Reject"),

          sub.status === "rejected" && h("button", {
            className: "btn",
            onClick: () => updateSubmissionStatus(api, sub, "appealed")
          }, "Mark Appealed")
        )
      );
    })
  );
}

function PendingItemEditor({ api, item }) {
  const counts = api.activeFams.map(fam => {
    const existing = api.data.point_submission_item_fam_counts
      .find(c => c.item_id === item.id && c.fam_id === fam.id);

    return { fam, existing };
  });

  return h("div", { className: "card", style: { marginTop: 12, background: "#fbfbfa" } },
    h("div", { className: "card-title" }, "Activity Item"),

    h("div", { className: "controls" },
      h("select", {
        value: item.final_task_id || "",
        onChange: e => updateItemTask(api, item.id, e.target.value)
      },
        h("option", { value: "" }, "Select Task"),
        api.data.tasks.map(t =>
          h("option", { key: t.id, value: t.id }, `${t.name} (+${t.points})`)
        )
      )
    ),

    h("div", { className: "grid" },
      counts.map(({ fam, existing }) =>
        h("div", { key: fam.id, className: "task-row", style: { borderRadius: 14 } },
          h("span", null, fam.name),
          existing
            ? h("input", {
                type: "number",
                min: 0,
                value: existing.member_count,
                style: { width: 80 },
                onChange: e => updateFamCount(api, existing, e.target.value)

function SettingsPage(api) {
  const [newSem, setNewSem] = useState("");
  const [newFamNames, setNewFamNames] = useState({});
  const [adjustFamId, setAdjustFamId] = useState(api.activeFams[0]?.id || "");
  const [adjustPoints, setAdjustPoints] = useState("");

  useEffect(() => {
    const map = {};
    api.activeFams.forEach(f => { map[f.id] = f.name; });
    setNewFamNames(map);

    if (!api.activeFams.find(f => f.id === adjustFamId)) {
      setAdjustFamId(api.activeFams[0]?.id || "");
    }
  }, [api.activeSemId, api.activeFams.length]);

  async function saveFamNames() {
    if (USE_SUPABASE) {
      for (const [id, name] of Object.entries(newFamNames)) {
        const { error } = await db
          .from("fams")
          .update({ name: safeName(name) || "Fam" })
          .eq("id", id);

        if (error) return api.showFlash(error.message, "error");
      }

      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        fams: d.fams.map(f =>
          f.semester_id === api.activeSemId
            ? { ...f, name: safeName(newFamNames[f.id]) || f.name }
            : f
        )
      }));
    }

    api.showFlash("Fam names saved");
  }

  async function addFam() {
    const slot = api.activeFams.length + 1;
    const color_key = colorFor(api.activeFams.length).key;
    const name = "New Fam";

    if (USE_SUPABASE) {
      const { error } = await db
        .from("fams")
        .insert({ semester_id: api.activeSemId, slot, name, color_key });

      if (error) return api.showFlash(error.message, "error");

      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        fams: [
          ...d.fams,
          { id: uid("fam"), semester_id: api.activeSemId, slot, name, color_key }
        ]
      }));
    }

    api.showFlash("Fam added");
  }

  async function deleteFam(id) {
    if (api.activeFams.length <= 1) {
      return api.showFlash("You need at least one fam this semester", "error");
    }

    const fam = api.activeFams.find(f => f.id === id);
    const confirmation = prompt(`Type DELETE ${fam?.name || "FAM"} to delete this fam.`);

    if (confirmation !== `DELETE ${fam?.name || "FAM"}`) {
      return api.showFlash("Fam delete cancelled", "error");
    }

    if (USE_SUPABASE) {
      await db.from("member_semesters").update({ fam_id: null, is_fam_head: false }).eq("fam_id", id);
      await db.from("fam_point_logs").delete().eq("fam_id", id);
      await db.from("point_submission_item_fam_counts").delete().eq("fam_id", id);

      const { error } = await db.from("fams").delete().eq("id", id);
      if (error) return api.showFlash(error.message, "error");

      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        fams: d.fams.filter(f => f.id !== id),
        fam_point_logs: (d.fam_point_logs || []).filter(log => log.fam_id !== id),
        point_submission_item_fam_counts: (d.point_submission_item_fam_counts || []).filter(c => c.fam_id !== id),
        member_semesters: d.member_semesters.map(ms =>
          ms.fam_id === id ? { ...ms, fam_id: null, is_fam_head: false } : ms
        )
      }));
    }

    api.showFlash("Fam deleted");
  }

  async function applyFamAdjustment() {
    if (!adjustFamId || !Number(adjustPoints)) {
      return api.showFlash("Select a fam and enter points", "error");
    }

    if (USE_SUPABASE) {
      const { error } = await db.from("fam_point_logs").insert({
        submission_item_id: null,
        fam_id: adjustFamId,
        task_id: null,
        member_count: 0,
        points_per_member: 0,
        total_points: Number(adjustPoints),
        semester_id: api.activeSemId
      });

      if (error) return api.showFlash(error.message, "error");

      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        fam_point_logs: [
          ...(d.fam_point_logs || []),
          {
            id: uid("famlog"),
            submission_item_id: null,
            fam_id: adjustFamId,
            task_id: null,
            member_count: 0,
            points_per_member: 0,
            total_points: Number(adjustPoints),
            semester_id: api.activeSemId,
            created_at: new Date().toISOString()
          }
        ]
      }));
    }

    setAdjustPoints("");
    api.showFlash("Fam points adjusted");
  }

  async function resetSelectedFamPoints() {
    if (!adjustFamId) return api.showFlash("Select a fam", "error");

    const fam = api.activeFams.find(f => f.id === adjustFamId);
    const confirmation = prompt(`Type RESET ${fam?.name || "FAM"} to reset this fam's points to 0.`);

    if (confirmation !== `RESET ${fam?.name || "FAM"}`) {
      return api.showFlash("Fam reset cancelled", "error");
    }

    const currentPoints = api.famPoints(adjustFamId);

    if (!currentPoints) {
      return api.showFlash("This fam already has 0 points");
    }

    if (USE_SUPABASE) {
      const { error } = await db.from("fam_point_logs").insert({
        submission_item_id: null,
        fam_id: adjustFamId,
        task_id: null,
        member_count: 0,
        points_per_member: 0,
        total_points: -currentPoints,
        semester_id: api.activeSemId
      });

      if (error) return api.showFlash(error.message, "error");

      await api.loadAll();
    } else {
      await api.mutateLocal(d => ({
        ...d,
        fam_point_logs: [
          ...(d.fam_point_logs || []),
          {
            id: uid("famlog"),
            submission_item_id: null,
            fam_id: adjustFamId,
            task_id: null,
            member_count: 0,
            points_per_member: 0,
            total_points: -currentPoints,
            semester_id: api.activeSemId,
            created_at: new Date().toISOString()
          }
        ]
      }));
    }

    api.showFlash("Fam points reset");
  }

  async function createSemester() {
    if (!safeName(newSem)) return api.showFlash("Semester name required", "error");

    const id = uid("sem");
    const sourceFams = api.activeFams.length
      ? api.activeFams
      : STARTER_FAMS.map((f, i) => ({ slot: i + 1, name: f.name, color_key: f.color_key }));

    if (USE_SUPABASE) {
      const { data: sem, error } = await db
        .from("semesters")
        .insert({ name: safeName(newSem), is_active: false })
        .select()
        .single();

      if (error) return api.showFlash(error.message, "error");

      await db.from("fams").insert(sourceFams.map((f, i) => ({
        semester_id: sem.id,
        slot: f.slot || i + 1,
        name: f.name,
        color_key: f.color_key
      })));

      const rows = api.data.members.map(m => ({
        member_id: m.id,
        semester_id: sem.id,
        fam_id: null,
        is_fam_head: false
      }));

      if (rows.length) await db.from("member_semesters").insert(rows);

      await api.loadAll();
      api.setActiveSemId(sem.id);
    } else {
      await api.mutateLocal(d => {
        const newFams = sourceFams.map((f, i) => ({
          id: uid("fam"),
          semester_id: id,
          slot: f.slot || i + 1,
          name: f.name,
          color_key: f.color_key

        return {
          ...d,
          semesters: [...d.semesters, { id, name: safeName(newSem), is_active: false }],

          member_semesters: [

              member_id: m.id,
              semester_id: id,
              fam_id: null,
              is_fam_head: false
            }))
          ]
        };
      });

      api.setActiveSemId(id);

    setNewSem("");
    api.showFlash("Semester created. Members start unassigned.");

  async function clearSemesterData(id) {
    const submissionsForSemester = (api.data.point_submissions || [])
      .filter(s => s.semester_id === id)
      .map(s => s.id);

    const itemsForSemester = (api.data.point_submission_items || [])
      .filter(item => submissionsForSemester.includes(item.submission_id))
      .map(item => item.id);

    if (USE_SUPABASE) {
      if (itemsForSemester.length) {
        await db.from("point_submission_item_members").delete().in("item_id", itemsForSemester);
        await db.from("point_submission_item_fam_counts").delete().in("item_id", itemsForSemester);
        await db.from("point_submission_items").delete().in("id", itemsForSemester);
      }

      if (submissionsForSemester.length) {
        await db.from("point_submissions").delete().in("id", submissionsForSemester);
      }

      await db.from("fam_point_logs").delete().eq("semester_id", id);
      await db.from("completions").delete().eq("semester_id", id);
      await db.from("member_semesters").update({ fam_id: null, is_fam_head: false }).eq("semester_id", id);
    } else {
      await api.mutateLocal(d => ({
        ...d,
        completions: d.completions.filter(c => c.semester_id !== id),
        fam_point_logs: (d.fam_point_logs || []).filter(log => log.semester_id !== id),
        point_submissions: (d.point_submissions || []).filter(s => s.semester_id !== id),
        point_submission_items: (d.point_submission_items || []).filter(item => !itemsForSemester.includes(item.id)),
        point_submission_item_fam_counts: (d.point_submission_item_fam_counts || []).filter(c => !itemsForSemester.includes(c.item_id)),
        point_submission_item_members: (d.point_submission_item_members || []).filter(m => !itemsForSemester.includes(m.item_id)),
        member_semesters: d.member_semesters.map(ms =>
          ms.semester_id === id ? { ...ms, fam_id: null, is_fam_head: false } : ms
        )
      }));
    }
  }

    } else {
      await api.mutateLocal(d => ({
        ...d,
        semesters: d.semesters.filter(s => s.id !== id),
        fams: d.fams.filter(f => f.semester_id !== id),
        member_semesters: d.member_semesters.filter(ms => ms.semester_id !== id),
        completions: d.completions.filter(c => c.semester_id !== id),
        fam_point_logs: (d.fam_point_logs || []).filter(log => log.semester_id !== id),
        point_submissions: (d.point_submissions || []).filter(s => s.semester_id !== id),
        point_submission_items: (d.point_submission_items || []).filter(item => !itemsForSemester.includes(item.id)),
        point_submission_item_fam_counts: (d.point_submission_item_fam_counts || []).filter(c => !itemsForSemester.includes(c.item_id)),
        point_submission_item_members: (d.point_submission_item_members || []).filter(m => !itemsForSemester.includes(m.item_id))
      }));
    }

    if (api.activeSemId === id) {
      api.setActiveSemId(api.data.semesters.find(s => s.id !== id)?.id || "fall2026");
    }

    api.showFlash("Semester deleted");
  }

  async function resetEverything() {
    const confirmation = prompt(
      'DANGER: This will permanently delete ALL members, tasks, semesters, submissions, fam assignments, and points.\n\nType "DELETE EVERYTHING" to continue.'
    );

    if (confirmation !== "DELETE EVERYTHING") {
      api.showFlash("Tracker reset cancelled", "error");
      return;
    }

    if (USE_SUPABASE) {
      await db.from("fam_point_logs").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("point_submission_item_members").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("point_submission_item_fam_counts").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("point_submission_items").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("point_submissions").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("completions").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("member_semesters").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("members").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("tasks").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("fams").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      await db.from("semesters").delete().neq("id", "00000000-0000-0000-0000-000000000000");

      await seedFall2026();
      await api.loadAll();
    } else {
      saveLocal(DEFAULT_LOCAL);
      api.setData(DEFAULT_LOCAL);
      api.setActiveSemId("fall2026");
    }

    api.showFlash("Tracker reset");
  }

  return h("section", null,
    h("div", { className: "section-head" },
      h("h2", { className: "section-title" }, "Settings"),
      h(SemesterPicker, api)
    ),

    h("div", { className: "grid two-col" },
      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Fams — " + api.activeSem.name),
        h("p", { className: "helper" }, "Add, rename, remove, or manually adjust fams for this semester."),

        h("div", { className: "grid" }, api.activeFams.map(f =>
          h("div", { key: f.id, className: "fam-edit-row" },
            h("span", { className: "fam-swatch", style: { background: famMeta(f.color_key).bar } }),
            h("input", {
              value: newFamNames[f.id] ?? f.name,
              onChange: e => setNewFamNames(p => ({ ...p, [f.id]: e.target.value }))
            }),
            h("span", { className: "points-text" }, api.famPoints(f.id) + " pts"),
            h("button", { className: "btn btn-sm btn-danger", onClick: () => deleteFam(f.id) }, "X")
          )
        )),

        api.activeFams.length === 0 && h("div", { className: "empty" }, "No fams yet — add one below."),

        h("div", { className: "row-actions", style: { marginTop: 14, justifyContent: "flex-start" } },
          h("button", { className: "btn btn-dark", onClick: saveFamNames }, "Save Names"),
          h("button", { className: "btn", onClick: addFam }, "+ Add Fam")
        )
      ),

      h("div", { className: "card" },
        h("div", { className: "card-title" }, "Fam Point Management"),
        h("p", { className: "helper" }, "Use positive numbers to add points and negative numbers to subtract points. Reset brings one fam to 0 without affecting other fams."),

        h("div", { className: "controls" },
          h("select", {
            value: adjustFamId,
            onChange: e => setAdjustFamId(e.target.value)
          },
            api.activeFams.map(f =>
              h("option", { key: f.id, value: f.id }, f.name + " — " + api.famPoints(f.id) + " pts")
            )
          ),

          h("input", {
            className: "tiny",
            type: "number",
            value: adjustPoints,
            onChange: e => setAdjustPoints(e.target.value),
            placeholder: "+/- Points"
          }),

          h("button", { className: "btn btn-dark", onClick: applyFamAdjustment }, "Apply"),
          h("button", { className: "btn btn-danger", onClick: resetSelectedFamPoints }, "Reset Fam")
        )
      )
    ),

    h("div", { className: "card", style: { marginTop: 18 } },
      h("div", { className: "card-title" }, "Semesters"),
      h("div", { className: "quick-add", style: { marginBottom: 18, justifyContent: "flex-start" } },
        h("input", { value: newSem, onChange: e => setNewSem(e.target.value), placeholder: "Spring 2027" }),
        h("button", { className: "btn btn-dark", onClick: createSemester }, "Create")
      ),

      h("div", { className: "grid" }, api.data.semesters.map(s =>
        h("div", { key: s.id, className: "semester-row" },
          h("span", null, s.name),
          h("div", { className: "row-actions" },
            h("button", { className: "btn btn-sm", onClick: () => api.setActiveSemId(s.id) }, s.id === api.activeSemId ? "Active" : "Switch"),
            h("button", { className: "btn btn-sm", onClick: () => resetSemester(s.id) }, "Reset"),
            h("button", { className: "btn btn-sm btn-danger", onClick: () => deleteSemester(s.id) }, "Delete")
          )
        )
      ))
    ),

    h("div", { className: "card danger-zone" },
      h("div", { className: "card-title" }, "Danger Zone"),
      h("p", { className: "helper" }, "This fully clears the tracker and returns it to a blank Fall 2026 start."),
      h("button", { className: "btn btn-danger", onClick: resetEverything }, "Reset Entire Tracker")
    )
  );
}


// ============================================================
//  MOUNT REACT APP
// ============================================================
ReactDOM.render(h(App), document.getElementById("root"));
</script>
</body>
</html>
